<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanki Online Model Showcase</title>
    
    <!-- Import official Material Symbols icon library and fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />
    
    <style>
        /* Prevent FOUT */
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap');
        body.fouc-loading { opacity: 0; pointer-events: none; }
        body { transition: opacity 0.3s ease-in; opacity: 1; }
        * { -webkit-tap-highlight-color: transparent; }
        
        /* Design Tokens - Official Brand Theme */
        :root {
            --tanki-green: #76FF33;
            --tanki-cyan: #00D4FF;
            --tanki-light-blue: #BFD5FF;
            --tanki-yellow: #FFCC00;
            --tanki-bright-yellow: #FFEE00;
            --tanki-dark: #001926;
            --tanki-purple: #D580FF;
            --tanki-salmon: #FF6666;
            --tanki-red: #FF3333;
            --tanki-orange: #FF8000;

            --md-sys-color-background: var(--tanki-dark);
            --md-sys-color-surface: var(--tanki-dark);
            --md-sys-color-surface-container-low: #002233;
            --md-sys-color-surface-container: #002b40;
            --md-sys-color-surface-container-high: #003650;
            --md-sys-color-surface-container-highest: #004466;
            
            --md-sys-color-primary: var(--tanki-green);
            --md-sys-color-on-primary: var(--tanki-dark);
            --md-sys-color-primary-container: rgba(118, 255, 51, 0.15);
            --md-sys-color-on-primary-container: var(--tanki-green);
            
            --md-sys-color-outline: var(--tanki-light-blue);
            --md-sys-color-outline-variant: #004466;
            
            --md-sys-color-on-surface: #ffffff;
            --md-sys-color-on-surface-variant: var(--tanki-light-blue);

            --md-state-hover: rgba(191, 213, 255, 0.1);
            --md-state-focus: rgba(191, 213, 255, 0.15);
            --md-state-primary-hover: rgba(118, 255, 51, 0.1);
            
            --shape-l: 24px;
            --shape-m: 16px;
            --shape-s: 16px; 
            
            --hull: var(--tanki-green); 
            --turret: var(--tanki-green); 
            --scene: var(--tanki-orange); 
        }

        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded', sans-serif;
            font-size: 24px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Hard locked DOM root - fixes viewport bugs */
        html, body {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden; 
        }

        body { 
            font-family: 'Rubik', 'M PLUS 1p'; 
            background: var(--md-sys-color-background); color: var(--md-sys-color-on-surface); 
            touch-action: none; 
            position: relative;
        }
        
        h3 { letter-spacing: 0; line-height: 24px; }
        p, span, div { letter-spacing: 0.25px; }
        
        #top-bar { 
            position: absolute; top: 0; left: 0; right: 0; padding: 16px 24px; 
            background: linear-gradient(to bottom, rgba(0,25,38,0.9), transparent); 
            z-index: 10; display:flex; justify-content: space-between; align-items: center; 
            pointer-events: none;
        }
        .app-title { font-weight: 500; font-size: 20px; color: var(--md-sys-color-on-surface); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .top-bar-actions { display: flex; gap: 12px; pointer-events: auto; }
        .action-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline-variant); box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .action-btn:hover { background: color-mix(in srgb, var(--md-sys-color-surface-container-high), white 10%); transform: scale(1.05); color: var(--md-sys-color-primary); border-color: var(--md-sys-color-primary);}
        .action-btn .material-symbols-rounded { font-size: 22px; }

        #toast { 
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); 
            background: #2b3135; color: #f1f0f4; padding: 14px 24px; border-radius: 100px; opacity: 0; transition: 0.4s cubic-bezier(0.2,0,0,1); 
            pointer-events: none; z-index: 300; box-shadow: 0 4px 8px rgba(0,0,0,0.3); font-size: 14px; 
            display:flex; align-items:center; gap:8px; 
            max-width: 90vw; width: max-content; box-sizing: border-box; text-align: center; word-break: break-word; line-height: 1.4;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #drawer { 
            position: absolute; top: 0; right: 0; bottom: 0; width: 360px; max-width: 95vw; 
            background: var(--md-sys-color-surface-container-low); 
            border-top-left-radius: var(--shape-l); border-bottom-left-radius: var(--shape-l);
            display: flex; z-index: 90; 
            flex-direction: column; box-shadow: -4px 0 12px rgba(0,0,0,0.3);
            border-left: 1px solid rgba(191, 213, 255, 0.05);
            transform: translateX(100%); opacity: 0; visibility: hidden;
            transition: transform 0.3s cubic-bezier(0.2,0,0,1), opacity 0.3s, visibility 0.3s;
        }
        #drawer.open { transform: translateX(0); opacity: 1; visibility: visible; }

        #drawer-handle { display: none; }

        @media (max-width: 768px) {
            #top-bar { padding: 12px 16px; }
            #btn-menu { display: none; } 

            #drawer-handle {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                height: 48px; flex-shrink: 0; cursor: grab;
                background: var(--md-sys-color-surface-container-low);
                border-bottom: 1px solid rgba(255,255,255,0.05);
                border-top-left-radius: var(--shape-l);
                border-top-right-radius: var(--shape-l);
            }
            #drawer-handle:active { cursor: grabbing; }
            .handle-pill { width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.3); margin-bottom: 6px; }
            .handle-lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); letter-spacing: 0.5px; text-transform: uppercase;}
            
            #drawer {
                top: auto; bottom: 0; left: 0; right: 0;
                width: 100%; max-width: none; height: 65vh;
                border-radius: var(--shape-l) var(--shape-l) 0 0;
                border-left: none; border-top: 1px solid rgba(191, 213, 255, 0.05);
                box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
                transform: translateY(calc(100% - 48px)); 
                opacity: 1; visibility: visible; 
            }
            #drawer.open { transform: translateY(0); }
        }
        
        .unified-toolbar { 
            display: flex; align-items: center; padding: 12px 16px; gap: 8px; 
            background: var(--md-sys-color-surface-container); 
            border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
        }
        .toolbar-btn {
            flex: 1; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: var(--shape-s); border: 1px solid var(--md-sys-color-outline-variant); 
            background: transparent; color: var(--md-sys-color-on-surface-variant); 
            cursor: pointer; transition: 0.2s; box-sizing: border-box; position: relative;
        }
        .toolbar-btn .material-symbols-rounded { font-size: 22px; }
        .toolbar-btn:hover { background: var(--md-state-hover); color: var(--md-sys-color-on-surface); }
        .toolbar-btn.active { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); border-color: var(--md-sys-color-primary); }
        
        .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px; }
        
        .toolbar-btn.action-btn.export { color: var(--md-sys-color-primary); }
        .toolbar-btn.action-btn.export:hover { background: rgba(118,255,51,0.08); }
        .toolbar-btn.action-btn.clear { color: var(--tanki-salmon); }
        .toolbar-btn.action-btn.clear:hover { background: rgba(255,102,102,0.08); }

        .drawer-content { flex: 1; overflow-y: auto; padding: 16px 16px 20px; display: none; }
        .drawer-content.active { display: block; }

        .m3-card { 
            background: transparent; border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--shape-m); padding: 16px; margin-bottom: 16px; transition: 0.2s;
        }
        .m3-card:hover { border-color: var(--md-sys-color-outline); }

        .card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; display:flex; align-items:center; gap:8px; opacity: 0.9;}

        .control-col { display: flex; flex-direction: column; gap: 8px; }
        .icon-grid-wrapper { display: flex; flex-direction: column; gap: 6px; position: relative; margin-bottom: 8px; }
        .icon-grid-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
        .icon-grid-label { font-size: 11px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); letter-spacing: 0.5px; text-transform: uppercase; }
        .selection-text { font-size: 13px; font-weight: 600; text-transform: capitalize; }
        .icon-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .icon-grid-btn {
            width: 48px; height: 48px; background: var(--md-sys-color-surface-container-highest);
            border: 2px solid transparent; border-radius: var(--shape-s);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s cubic-bezier(0.2,0,0,1); color: var(--md-sys-color-on-surface-variant); 
            padding: 8px; box-sizing: border-box; user-select: none;
        }
        .icon-grid-btn:hover { background: var(--md-state-hover); transform: translateY(-2px); }
        .icon-grid-btn.selected { border-color: var(--md-sys-color-primary); background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .icon-grid-btn svg, .icon-grid-btn img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .icon-grid-btn svg { fill: currentColor; }
        .icon-grid-btn.text-btn { width: auto; min-width: 48px; padding: 0 16px; font-size: 13px; font-weight: 500; }

        #box-hull .icon-grid-label, #box-hull-skin .icon-grid-label, #box-hull .selection-text, #box-hull-skin .selection-text { color: var(--hull); }
        #box-hull .icon-grid-btn.selected, #box-hull-skin .icon-grid-btn.selected { border-color: var(--hull); background: rgba(118, 255, 51, 0.15); color: var(--hull); }
        #box-turret .icon-grid-label, #box-turret-skin .icon-grid-label, #box-turret .selection-text, #box-turret-skin .selection-text { color: var(--turret); }
        #box-turret .icon-grid-btn.selected, #box-turret-skin .icon-grid-btn.selected { border-color: var(--turret); background: rgba(118, 255, 51, 0.15); color: var(--turret); }
        #box-scene .icon-grid-label, #box-scene .selection-text { color: var(--scene); }
        #box-scene .icon-grid-btn.selected { border-color: var(--scene); background: rgba(255, 128, 0, 0.15); color: var(--scene); }

        .icon-grid-wrapper.loading::after { content: ''; position: absolute; inset: -4px; background: rgba(0, 25, 38, 0.7); border-radius: var(--shape-s); z-index: 10; }
        .icon-grid-wrapper.loading::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--md-sys-color-primary); border-radius: 50%; animation: spin 1s linear infinite; z-index: 11; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .native-select-hidden { display: none; }

        .anim-chip-row { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px; }
        .anim-chip-label { width:100%; font-size: 11px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; color: var(--md-sys-color-outline-variant); margin-bottom: 2px; }
        .anim-chip { position: relative; font-family: inherit; font-size: 12px; font-weight:500; letter-spacing:0.2px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--md-sys-color-outline-variant); background: transparent; color: var(--md-sys-color-on-surface-variant); cursor: pointer; transition: 0.15s; display:inline-flex; align-items:center; gap:6px; text-transform: capitalize; user-select: none; touch-action: manipulation; }
        .anim-chip .chip-bar { position: absolute; inset: -3px; border-radius: 11px; padding: 3px; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0; z-index: 2; }
        .anim-chip.active { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); border-color: var(--md-sys-color-primary-container); }
        .anim-chip.active .chip-bar { opacity: 1; background: conic-gradient(var(--md-sys-color-primary) var(--p, 0%), transparent 0); }
        .anim-chip.looping .chip-bar { background: conic-gradient(from var(--ang, 0deg), transparent 0deg, var(--md-sys-color-primary) 45deg, transparent 55deg); }
        .anim-chip.looping::after { content: "∞"; position: absolute; top:2px; right:6px; font-size: 9px; opacity: 0.7; z-index: 1; }
        .anim-chip .chip-dot { width:6px; height:6px; border-radius:50%; background: currentColor; opacity:0.6; position: relative; z-index:1; }
        .anim-chip .chip-text { position: relative; z-index:1; }
        .anim-chip:not(.active) .chip-dot { opacity:0; }
        .anim-chip.pressing { transform: scale(0.96); }

        .beta-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer; user-select: none; margin-bottom:8px; }
        .beta-label { font-size: 14px; font-weight: 500; color: var(--md-sys-color-on-surface); }
        .beta-switch { width: 52px; height: 32px; background: var(--md-sys-color-surface-container-highest); border: 2px solid var(--md-sys-color-outline-variant); border-radius: 100px; position: relative; transition: 0.2s; box-sizing: border-box; }
        .beta-switch::after { content: ''; position: absolute; top: 50%; left: 6px; transform: translateY(-50%); width: 16px; height: 16px; background: var(--md-sys-color-outline); border-radius: 50%; transition: 0.2s cubic-bezier(0.2, 0, 0, 1.3); }
        .beta-toggle.active .beta-switch { background: var(--scene); border-color: var(--scene); }
        .beta-toggle.active .beta-switch::after { background: var(--md-sys-color-on-primary); width: 24px; height: 24px; left: calc(100% - 28px); }
        
        #group-scene { display: none; margin-top: 10px; border-style:dashed; }
        #group-scene.visible { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

        .btn-text { background: transparent; border: none; height: 36px; padding: 0 16px; border-radius: 18px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .btn-text.error { color: var(--tanki-salmon); margin-top: 4px; width: 100%; border: 1px solid var(--md-sys-color-outline-variant); }
        .btn-text.error:hover { background: rgba(255, 102, 102, 0.08); border-color: var(--tanki-salmon); }

        .file-list { border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--shape-s); overflow: hidden; margin-top:10px; }
        .file-item { padding: 12px; border-bottom: 1px solid var(--md-sys-color-outline-variant); background: var(--md-sys-color-surface-container); font-size: 13px; display:flex; gap:12px; align-items:center; }
        .file-item .material-symbols-rounded { font-size: 20px; color: var(--md-sys-color-outline-variant); }
        
        .btn-add-file { position: relative; width: 100%; padding: 12px; border: 1px solid var(--md-sys-color-outline); border-radius: var(--shape-s); color: var(--md-sys-color-outline); text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; transition: 0.2s; box-sizing: border-box; }
        .btn-add-file:hover { background: var(--md-state-hover); border-color: var(--md-sys-color-on-surface); color: var(--md-sys-color-on-surface); }
        .btn-add-file .material-symbols-rounded { margin-right: 8px; font-size: 20px; }
        .btn-add-file input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--md-sys-color-surface-container-highest); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-outline-variant); }

        #dialog-scrim {
            position: fixed; inset: 0; background: rgba(0, 25, 38, 0.8);
            opacity: 0; pointer-events: none; z-index: 400; transition: 0.3s ease;
        }
        #dialog-scrim.show { opacity: 1; pointer-events: auto; }
        
        .m3-dialog {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95);
            width: 320px; max-width: 90vw; background: var(--md-sys-color-surface-container-highest);
            border-radius: var(--shape-l); padding: 24px; z-index: 410;
            opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.2,0,0,1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 16px; box-sizing: border-box;
        }
        .m3-dialog.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .m3-dialog-title { font-size: 20px; font-weight: 500; color: var(--md-sys-color-on-surface); margin: 0; }
        .m3-dialog-desc { font-size: 14px; color: var(--md-sys-color-on-surface-variant); margin: 0; line-height: 1.5; }
        .m3-dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
        
        .dialog-btn {
            background: transparent; border: none; padding: 10px 16px; border-radius: 100px;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .dialog-btn.cancel { color: var(--md-sys-color-outline); }
        .dialog-btn.cancel:hover { background: var(--md-state-hover); color: var(--md-sys-color-on-surface); }
        .dialog-btn.confirm { color: var(--tanki-dark); background: var(--tanki-green); }
        .dialog-btn.confirm:hover { background: color-mix(in srgb, var(--tanki-green), white 15%); }
        .dialog-btn.danger { color: #fff; background: var(--tanki-salmon); }
        .dialog-btn.danger:hover { background: color-mix(in srgb, var(--tanki-salmon), white 15%); }
    </style>
    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three/build/three.module.js", 
                "three/addons/": "https://unpkg.com/three/examples/jsm/" 
            } 
        }
    </script>
</head>
<body class="fouc-loading drawer-open">

    <!-- Top Action Bar -->
    <div id="top-bar">
        <div class="app-title" id="t-app-title">Model showcase</div>
        <div class="top-bar-actions">
            <button id="btn-cam" class="action-btn" title="4K Screenshot">
                <span class="material-symbols-rounded">photo_camera</span>
            </button>
            <button id="btn-menu" class="action-btn" title="Menu" onclick="window.toggleDrawer()">
                <span class="material-symbols-rounded">menu</span>
            </button>
        </div>
    </div>

    <div id="toast"><span>Ready</span></div>

    <!-- Modals -->
    <div id="dialog-scrim"></div>
    
    <div id="m3-dialog" class="m3-dialog">
        <h3 class="m3-dialog-title" id="dialog-title">Title</h3>
        <p class="m3-dialog-desc" id="dialog-desc">Desc</p>
        <div class="m3-dialog-actions">
            <button class="dialog-btn cancel" id="dialog-cancel">Cancel</button>
            <button class="dialog-btn confirm" id="dialog-confirm">Confirm</button>
        </div>
    </div>

    <!-- Right Drawer / Bottom Sheet -->
    <div id="drawer" class="open">
        <!-- Mobile drag handle -->
        <div id="drawer-handle" onclick="window.toggleDrawer()">
            <div class="handle-pill"></div>
            <span class="handle-lbl" id="t-handle-lbl">Menu & Equip</span>
        </div>

        <!-- 4 Buttons in one unified toolbar row using Material Symbols -->
        <div class="unified-toolbar">
            <button class="toolbar-btn tab-btn active" onclick="switchMode('assembly')" id="tab-btn-assembly" title="Tank Assembly">
                <span class="material-symbols-rounded">widgets</span>
            </button>
            <button class="toolbar-btn tab-btn" onclick="switchMode('normal')" id="tab-btn-normal" title="Local File">
                <span class="material-symbols-rounded">folder_open</span>
            </button>
            
            <div class="toolbar-divider"></div>
            
            <button class="toolbar-btn action-btn export" id="btn-export" title="Export GLB">
                <span class="material-symbols-rounded">download</span>
            </button>
            <button class="toolbar-btn action-btn clear" id="btn-clear" title="Clear All Objects">
                <span class="material-symbols-rounded">delete</span>
            </button>
        </div>

        <!-- Assembly Mode -->
        <div id="panel-assembly" class="drawer-content active">
            <!-- Hull Card -->
            <div class="m3-card">
                <div class="card-title" style="color:var(--hull)">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 3L3 2H7L8 3H16V5H6V6H10L12 8H15L16 9V11L14 13H2L0 11V8L2 6V3Z" fill="currentColor"/>
                    </svg>
                    <span id="t-hull-title">Hull</span>
                </div>
                <div class="control-col">
                    <div id="box-hull"><select id="sel-hull-name" class="native-select-hidden"></select></div>
                    <div id="box-hull-skin"><select id="sel-hull-skin" class="native-select-hidden"></select></div>
                    <div id="box-hull-anim" class="anim-chip-row" style="display:none;"></div>
                </div>
            </div>

            <!-- Turret Card -->
            <div class="m3-card">
                <div class="card-title" style="color:var(--turret)">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M5 0H7V12H9V0H11V6L14 9V13L11 16V16H9H7H5V16L2 13V9L5 6V0Z" fill="currentColor"/>
                    </svg>
                    <span id="t-turret-title">Turret</span>

    let globalPointerDownX = 0;

    document.addEventListener('pointerdown', (e) => {
        globalPointerDownX = e.clientX;

    });

    document.addEventListener('click', (e) => {
        if (drawerOpen) {
            const dx = e.clientX - globalPointerDownX;
            const dy = e.clientY - globalPointerDownY;
            if (Math.sqrt(dx * dx + dy * dy) > 5) {
                return;
            }

            if (!e.target.closest('#drawer') && 
                !e.target.closest('#top-bar') && 
                !e.target.closest('#dialog-scrim') &&

    const drawerEl = document.getElementById('drawer');
    drawerEl.addEventListener('touchstart', (e) => {
        if(window.innerWidth > 768) return; 
        const activeContent = drawerEl.querySelector('.drawer-content.active');
        if (drawerOpen && activeContent && activeContent.scrollTop > 0 && !e.target.closest('#drawer-handle')) return;
        swipeStartY = e.touches[0].clientY;
        currentSwipeY = swipeStartY;

    drawerEl.addEventListener('touchmove', (e) => {
        if (!swipeStartY || window.innerWidth > 768) return;
        currentSwipeY = e.touches[0].clientY;
        let dy = currentSwipeY - swipeStartY;
        if (drawerOpen && dy > 0) { 
            drawerEl.style.transform = `translateY(${dy}px)`; 
        } else if (!drawerOpen && dy < 0) {
            drawerEl.style.transform = `translateY(calc(100% - 48px + ${dy}px))`;
        }
    }, {passive: true});

    drawerEl.addEventListener('touchend', (e) => {
        if (!swipeStartY || window.innerWidth > 768) return;
        drawerEl.style.transition = '';
        let dy = currentSwipeY - swipeStartY;
        
        if (Math.abs(dy) > 50) {
            if (drawerOpen && dy > 0) window.toggleDrawer();
            else if (!drawerOpen && dy < 0) window.toggleDrawer();

        } else {
            drawerEl.style.transform = '';
        }
        swipeStartY = 0; currentSwipeY = 0;
    });

    // Normalize texture/material labels for matching:
    // "BG1 1024.PNG" / "bg1_1024.webp" / "Material #9" -> comparable stems
    function texStem(s) {
        if (!s) return '';
        return String(s).toLowerCase()
            .replace(/^.*[\\/]/, '')          // strip path
            .replace(/\.[a-z0-9]+$/i, '')     // strip extension
            .replace(/[\s_\-]+/g, '');        // collapse separators (bg1 1024 == bg11024)
    }

    // Parse a 3DS ArrayBuffer for material→texture and mesh→material maps.
    // Needed because most garage .3ds files name materials "Material #NNNN"
    // while the actual link to "BL.PNG"/"GAR1.PNG" lives only in the texture-map chunk.
    // Birthday 16 is the exception where material names already equal texture stems.
    function parse3dsTextureBindings(buf) {
        const data = new Uint8Array(buf);
        const view = new DataView(buf);
        const matTex = Object.create(null);   // materialName -> textureBasename
        const meshMats = Object.create(null); // meshName -> [materialName]

        const readCString = (off, end) => {
            let i = off;
            while (i < end && data[i] !== 0) i++;
            return { str: new TextDecoder('latin1').decode(data.subarray(off, i)), next: i + 1 };
        };

        const walk = (offset, end) => {
            while (offset + 6 <= end) {
                const cid = view.getUint16(offset, true);
                const size = view.getUint32(offset + 2, true);
                if (size < 6 || offset + size > end) break;
                const chunkEnd = offset + size;
                const ds = offset + 6;

                if (cid === 0x4D4D || cid === 0x3D3D) {
                    walk(ds, chunkEnd);
                } else if (cid === 0xAFFF) { // material entry
                    let matName = null, texName = null;
                    let pos = ds;
                    while (pos + 6 <= chunkEnd) {
                        const scid = view.getUint16(pos, true);
                        const ssize = view.getUint32(pos + 2, true);
                        if (ssize < 6 || pos + ssize > chunkEnd) break;
                        if (scid === 0xA000) { // material name
                            matName = readCString(pos + 6, pos + ssize).str;
                        } else if (scid === 0xA200 || scid === 0xA210 || scid === 0xA230 || scid === 0xA204) {
                            // diffuse / opacity / bump / specular map — dig for filename (0xA300)
                            let tpos = pos + 6;
                            const tend = pos + ssize;
                            while (tpos + 6 <= tend) {
                                const tcid = view.getUint16(tpos, true);
                                const tsize = view.getUint32(tpos + 2, true);
                                if (tsize < 6 || tpos + tsize > tend) break;
                                if (tcid === 0xA300) {
                                    const tn = readCString(tpos + 6, tpos + tsize).str;
                                    if (tn) texName = tn;
                                }
                                tpos += tsize;
                            }
                        }
                        pos += ssize;
                    }
                    if (matName && texName) matTex[matName] = texName;
                } else if (cid === 0x4000) { // named object
                    const { str: objName, next } = readCString(ds, chunkEnd);
                    const matsUsed = [];
                    const findMats = (o, e) => {
                        while (o + 6 <= e) {
                            const c = view.getUint16(o, true);
                            const s = view.getUint32(o + 2, true);
                            if (s < 6 || o + s > e) break;
                            if (c === 0x4100) {
                                findMats(o + 6, o + s);
                            } else if (c === 0x4120) {
                                const nfaces = view.getUint16(o + 6, true);
                                findMats(o + 6 + 2 + nfaces * 8, o + s);
                            } else if (c === 0x4130) {
                                matsUsed.push(readCString(o + 6, o + s).str);
                            }
                            o += s;
                        }
                    };
                    findMats(next, chunkEnd);
                    if (objName) meshMats[objName] = matsUsed;
                }
                offset = chunkEnd;
            }
        };
        walk(0, data.byteLength);
        return { matTex, meshMats };
    }

    async function loadRemoteScene(path, variant) {
        if(slots.scene) { disposeMixer(slots.scene); groupAssembly.remove(slots.scene); dispose(slots.scene); slots.scene=null; }
        sceneLib.meshes =[]; sceneLib.tex.clear();
        try {
            msg(T.loading); const meta = await fetchMeta(path);
            const models = meta.filter(f => f.name.match(/\.(a3d|3ds)$/i));
            // Only browser-decodable images (skip GPU-compressed .ktx)
            const images = meta.filter(f => f.name.match(/\.(webp|png|jpg|jpeg)$/i) && !/\.ktx$/i.test(f.name));
            // Encode path segments so names with spaces (e.g. "bg1 1024.webp") resolve
            const texUrlOf = (name) => `${RES_BASE}/${path}/${String(name).split('/').map(encodeURIComponent).join('/')}`;
            const texProm = images.map(async f => {
                const tex = await new THREE.TextureLoader().loadAsync(texUrlOf(f.name));
                tex.name = f.name; setupTex(tex); return { n: f.name, t: tex };
            });
            const loadedTex = await Promise.all(texProm); loadedTex.forEach(o => sceneLib.tex.set(o.n, o.t));

            const combinedGroup = new THREE.Group();
            for(let f of models) {
                const mUrl = `${RES_BASE}/${path}/${encodeURIComponent(f.name)}`;
                const resp = await fetch(mUrl); if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const buf = await resp.arrayBuffer();
                let grp;
                let bindings = null;

                if(f.name.toLowerCase().endsWith('.a3d')) {
                    grp = parseA3D(buf, f.name);
                } else {
                    // Parse texture bindings from the raw 3DS BEFORE TDSLoader runs.
                    bindings = parse3dsTextureBindings(buf);
                    // 3DS files reference missing .PNG names on CDN (.webp only).
                    // Stub those requests with a 1x1 pixel so the console stays clean;
                    // real textures are applied later by runSceneInjector.
                    const stubMgr = new THREE.LoadingManager();
                    const PIXEL = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
                    stubMgr.setURLModifier((url) => {
                        // Only rewrite texture-like relative paths; leave the .3ds itself alone
                        if (/\.(png|jpg|jpeg|bmp|tga|gif|webp)(\?|$)/i.test(url) || !/^https?:|^data:|^blob:/i.test(url)) {
                            return PIXEL;
                        }
                        return url;
                    });
                    const loader = new TDSLoader(stubMgr);
                    loader.setResourcePath('');
                    grp = loader.parse(buf, '');
                }

                grp.traverse(o => {
                    if (!o.isMesh) return;
                    if (o.parent) o.userData.parentName = o.parent.name;

                    const refs = [];
                    const pushRef = (v) => { if (v) refs.push(String(v)); };

                    // Material name(s) — works for Birthday 16 (mat name == tex stem)
                    // and for A3D (build() stores lowercased mat name that matches webp stem)
                    const mats = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
                    for (const mat of mats) {
                        pushRef(mat && mat.name);
                        // A3D materials also carry the original texture filename in userData
                        if (mat && mat.userData && mat.userData.texName) pushRef(mat.userData.texName);
                    }
                    pushRef(o.name);
                    pushRef(o.userData.parentName);

                    // From 3DS binary: map mesh → materials → texture basenames (the real fix)
                    if (bindings) {
                        const mlist = bindings.meshMats[o.name] || [];
                        for (const mn of mlist) {
                            pushRef(mn);
                            if (bindings.matTex[mn]) pushRef(bindings.matTex[mn]);
                        }
                        // Also accept any material currently on the mesh via matTex lookup
                        for (const mat of mats) {
                            if (mat && mat.name && bindings.matTex[mat.name]) pushRef(bindings.matTex[mat.name]);
                        }
                    }

                    o.userData.texRefs = Array.from(new Set(refs.filter(Boolean)));
                    sceneLib.meshes.push(o);
                });
                combinedGroup.add(grp);
            }
            slots.scene = combinedGroup; groupAssembly.add(combinedGroup); runSceneInjector();
            setCameraMode('fly');
            placeEnvCamera(combinedGroup);
            msg("Environment Loaded");
        } catch(e) { console.error(e); msg(String(e.message || e)); }
    }

    // Hide garage camera helper meshes and put the free-look camera on cam0,
    // aiming at the tank (hull/turret), not the whole garage bounds.
    function isCamMarkerName(n) {
        n = (n || '').toLowerCase();
        return n === 'cam0' || n === 'cam' || n === 'cam_t0' || n === 'cam_t' || n === 'camt0' || n.startsWith('cam');
    }
    function placeEnvCamera(envGroup) {
        if (!envGroup) return;
        envGroup.updateMatrixWorld(true);
        if (slots.hull?.group) slots.hull.group.updateMatrixWorld(true);
        if (slots.turret?.group) slots.turret.group.updateMatrixWorld(true);

        let camNode = null;
        envGroup.traverse(o => {
            const n = (o.name || '').toLowerCase();
            // Camera markers in garage assets: cam0 (eye) / cam_t0 (look-at helper)
            if (n === 'cam0' || n === 'cam') camNode = o;
            // Hide the helper geometry itself (mesh may be named differently under A3D parent)
            if (o.isMesh && (isCamMarkerName(o.name) || isCamMarkerName(o.parent && o.parent.name) || isCamMarkerName(o.userData.originalName))) {
                o.visible = false;
            }
        });

        // Look-at: prefer assembled tank; fall back to garage tank platform markers
        const look = new THREE.Vector3();
        let hasLook = false;
        const tankBox = new THREE.Box3();
        let hasTankBox = false;
        const expandTank = (grp) => {
            if (!grp) return;
            const b = new THREE.Box3().setFromObject(grp);
            if (b.isEmpty()) return;
            if (!hasTankBox) { tankBox.copy(b); hasTankBox = true; }
            else tankBox.union(b);
        };
        expandTank(slots.hull?.group);
        expandTank(slots.turret?.group);
        if (hasTankBox) {
            tankBox.getCenter(look);
            hasLook = true;
        } else {
            // No tank loaded yet — aim at garage tnk_plat / tnk_base / cam_t0
            const platBox = new THREE.Box3();
            let hasPlat = false;
            envGroup.traverse(o => {
                if (!o.isMesh || !o.visible) return;
                const n = ((o.name || '') + ' ' + (o.userData.originalName || '') + ' ' + (o.parent?.name || '')).toLowerCase();
                if (!(n.includes('tnk_plat') || n.includes('tnk_base') || n.includes('tank'))) return;
                const geo = o.geometry;
                if (!geo) return;
                if (!geo.boundingBox) geo.computeBoundingBox();
                if (!geo.boundingBox) return;
                const wb = geo.boundingBox.clone().applyMatrix4(o.matrixWorld);
                if (!hasPlat) { platBox.copy(wb); hasPlat = true; }
                else platBox.union(wb);
            });
            if (hasPlat) {
                platBox.getCenter(look);
                hasLook = true;
            } else {
                // Last resort: cam_t0 world position or origin
                let camT = null;
                envGroup.traverse(o => {
                    const n = (o.name || '').toLowerCase();
                    if (n === 'cam_t0' || n === 'cam_t' || n === 'camt0') camT = o;
                });
                if (camT) { camT.getWorldPosition(look); hasLook = true; }
                else look.set(0, 0, 0);
            }
        }

        const pos = new THREE.Vector3();
        if (camNode) {
            camNode.getWorldPosition(pos);
        } else {
            // Fallback elevated view toward the tank
            const dist = hasTankBox ? Math.max(tankBox.getSize(new THREE.Vector3()).length() * 1.5, 120) : 400;
            pos.set(look.x + dist * 0.7, look.y + dist * 0.45, look.z + dist * 0.7);
        }

        camera.position.copy(pos);
        camera.lookAt(look);
        cameraTarget.position.copy(camera.position);
        cameraTarget.quaternion.copy(camera.quaternion);
    }

    function runSceneInjector() {
        let count = 0;

        // Pre-index textures by normalized stem for O(1)-ish lookup
        // e.g. "bg1 1024.webp" → stem "bg11024"
        const texByStem = new Map();
        for (const [texName, texObj] of sceneLib.tex) {
            const stem = texStem(texName);
            if (stem) texByStem.set(stem, texObj);
        }

        const scoreMatch = (candRaw, texName) => {
            const c = texStem(candRaw);
            const t = texStem(texName);
            if (!c || !t) return 0;
            if (c === t) return 100;                         // exact stem match (best)
            if (c.includes(t) && t.length >= 2) return 50 + t.length;
            if (t.includes(c) && c.length > 3) return 40 + c.length;
            return 0;
        };

        sceneLib.meshes.forEach(mesh => {
            // Prefer explicit texRefs harvested at load time (includes 3DS map filenames)
            const candidates = [];
            if (Array.isArray(mesh.userData.texRefs)) candidates.push(...mesh.userData.texRefs);
            if (mesh.material) {
                if (Array.isArray(mesh.material)) mesh.material.forEach(m => { if (m && m.name) candidates.push(m.name); });
                else if (mesh.material.name) candidates.push(mesh.material.name);
            }
            if (mesh.name) candidates.push(mesh.name);
            if (mesh.userData.parentName) candidates.push(mesh.userData.parentName);

            let bestTex = null;
            let bestScore = 0;

            // 1) exact stem hit via index
            for (const cand of candidates) {
                const stem = texStem(cand);
                if (stem && texByStem.has(stem)) {
                    bestTex = texByStem.get(stem);
                    bestScore = 100;
                    break;
                }
            }

            // 2) fuzzy contains either way, pick highest score
            if (!bestTex) {
                for (const [texName, texObj] of sceneLib.tex) {
                    for (const cand of candidates) {
                        const s = scoreMatch(cand, texName);
                        if (s > bestScore) {
                            bestScore = s;
                            bestTex = texObj;
                        }
                    }
                }
            }

            if (bestTex) {
                const prevName = (Array.isArray(mesh.material) ? mesh.material[0] : mesh.material)?.name || '';
                mesh.material = new THREE.MeshStandardMaterial({
                    map: bestTex,
                    emissiveMap: bestTex,
                    emissive: new THREE.Color(0x888888),
                    color: 0xffffff,
                    side: THREE.DoubleSide,
                    transparent: true,
                    alphaTest: 0.5,
                    name: prevName || bestTex.name
                });
                mesh.material.needsUpdate = true;
                count++;
            }
        });
        if (count > 0) msg(`Matched ${count} materials`);
    }

    async function loadModelFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'a3d') { return parseA3D(await file.arrayBuffer(), file.name); } 
        else if (ext === '3ds') { const loader = new TDSLoader(); loader.setResourcePath(''); const g = await loader.loadAsync(URL.createObjectURL(file)); g.traverse(o => { if(o.isMesh) { o.material=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.4,side:2}); o.userData.originalName=o.name; }}); return g; } 
        else { throw new Error(`Unsupported file extension: .${ext}`); }
    }

    function equipAssembly(grp, fname, type) {
        if(slots[type]) { const old = slots[type].group; disposeMixer(old); groupAssembly.remove(old); dispose(old); }
        slots[type] = { group: grp, name: fname }; groupAssembly.add(grp);
        if(type==='hull') { scanMount(grp); snapTurret(); } else { snapTurret(); }
        fitCamera(); registerAnim(grp); activeClips[type].clear(); renderAnimChips(type);
    }

    function scanMount(grp) {
        let found = false; grp.updateMatrixWorld(true);
        grp.traverse(o => { if(found) return; if(o.name && o.name.toLowerCase().includes("mount")) { const worldPos = new THREE.Vector3(); o.getWorldPosition(worldPos); mountPos = root.worldToLocal(worldPos.clone()); found = true; } });
        if(!found) mountPos = null;
    }
    
    function snapTurret() { if(slots.turret) { if(slots.hull && mountPos) slots.turret.group.position.copy(mountPos); else slots.turret.group.position.set(0,0,0); } }
    
    function applyNormalTexture(tex) {
        const base = tex.name.toLowerCase().split('.')[0];
        normalMeshes.forEach(m => {
            const part = (m.userData.originalName||m.name).toLowerCase(); let match = false;
            if(part.includes(base)) match=true;
            else if(base.includes('track') && (part.includes('track')||part.includes('chain'))) match=true;
            else if(base.includes('wheel') && part.includes('wheel')) match=true;
            else if((base.includes('lightmap')||base.includes('map')) && !part.includes('track') && !part.includes('wheel')) match=true;
            if(match) setMat(m, tex);
        });
    }

    function addUI(id, text) { const div = document.createElement('div'); div.className = 'file-item'; div.innerHTML = `<span class="material-symbols-rounded">insert_drive_file</span><span>${text}</span>`; document.getElementById(id).appendChild(div); }
    
    function setupTex(t) { t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=renderer.capabilities.getMaxAnisotropy(); }
    function setMat(m, t) { const apply = (mat) => { mat.map = t; mat.emissiveMap = t; mat.emissive = new THREE.Color(0xffffff); mat.emissiveIntensity = 0.5; mat.needsUpdate = true; }; if (Array.isArray(m.material)) m.material.forEach(apply); else apply(m.material); }
    function dispose(g){if(!g)return; g.traverse(o=>{if(o.isMesh){o.geometry.dispose();if(o.material){if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material.dispose();}}})}
    function fitCamera(){
        // Prefer garage cam marker while environment is active in free-look mode
        if (cameraMode === 'fly' && slots.scene) {
            placeEnvCamera(slots.scene);
            return;
        }
        const b = new THREE.Box3().setFromObject(root);
        if (b.isEmpty()) return;
        const c = b.getCenter(new THREE.Vector3());
        const size = b.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z, 1);
        const dist = Math.max(maxDim * 1.2, 80);
        camera.position.set(c.x + dist, c.y + dist * 0.55, c.z + dist);
        camera.lookAt(c);
        if (cameraMode === 'fly') {
            cameraTarget.position.copy(camera.position);
            cameraTarget.quaternion.copy(camera.quaternion);
        } else {
            orbitControls.target.copy(c);
            orbitControls.update();
        }
    }

    class BinR { constructor(b){this.v=new DataView(b);this.o=0;this.d=new TextDecoder()} sk(n){this.o+=n} pad(l){return(((l+3)>>2)*4)-l} u32(){const v=this.v.getUint32(this.o,1);this.o+=4;return v} i32(){const v=this.v.getInt32(this.o,1);this.o+=4;return v} u16(){const v=this.v.getUint16(this.o,1);this.o+=2;return v} f32(){const v=this.v.getFloat32(this.o,1);this.o+=4;return v} str(){const l=this.u32();const s=this.d.decode(new Uint8Array(this.v.buffer,this.v.byteOffset+this.o,l));this.o+=l+this.pad(l);return s} str0(){let b=[];while(this.o<this.v.byteLength){const c=this.v.getUint8(this.o++);if(c===0)break;b.push(c)}return this.d.decode(new Uint8Array(b))} }
