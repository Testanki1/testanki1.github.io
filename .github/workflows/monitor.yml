name: 3D坦克测试服监测

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@main
        with:
          persist-credentials: true

      - name: 设置 Node.js 环境
        uses: actions/setup-node@main
        with:
          node-version: '*'

      - name: 安装依赖
        run: npm install puppeteer nodemailer

      - name: 运行监测器
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node monitor.js

      # --- 新增：把生成的排查 HTML 上传到 GitHub ---
      - name: 保存排查 HTML (Artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-html-source
          path: debug_*.html  # <--- 这里把 .png 改成 .html
          retention-days: 5
