name: 3D坦克测试服监测

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@main
        with:
          persist-credentials: true

      - name: 设置 Node.js 环境
        uses: actions/setup-node@main
        with:
          node-version: '*'

      - name: 安装依赖
        run: npm install puppeteer nodemailer

      - name: 运行监测器
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node monitor.js

      # --- 新增：把生成的排查截图上传到 GitHub ---
      - name: 保存排查截图 (Artifacts)
        uses: actions/upload-artifact@v4 # 推荐使用 v4，速度最快
        if: always() # 确保即使前面的 node monitor.js 被中断或报错，也会执行上传
        with:
          name: debug-screenshots
          path: debug_*.png  # 抓取所有以 debug_ 开头的 png 图片
          retention-days: 5  # 文件保留 5 天（避免占用过多 GitHub 免费存储空间）
