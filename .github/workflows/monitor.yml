name: 3D坦克测试服监测

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch: 

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@main # 移除 @v4 版本号，改为拉取最新主分支
        with:
          persist-credentials: true

      - name: 设置 Node.js 环境
        uses: actions/setup-node@main # 移除 @v4 版本号，改为拉取最新主分支
        with:
          node-version: '*' # 移除固定的 '20' 版本，始终调用最新 Node.js

      - name: 安装依赖
        run: |
          npm install playwright nodemailer p-limit # NPM 默认行为即是不加版本号拉取最新库
          npx playwright install chromium

      - name: 运行监测器
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node monitor.js
