                                 if (p.mesh && p.mesh.file) {
                                     propDictCache[`${window.currentLibraryUrl}_${grp.name}_${p.name}`] = p;
                                     propDictCache[`${window.currentLibraryUrl}_${p.name}`] = p; 
                                 }
                             }
                         }
                         window.loadedLibraries.add(window.currentLibraryUrl);
                     } catch (e) {
                         console.warn("Failed to load official library.json", e);
                     }
                 }
             }
             return propDictCache;
         }
         
         function addPrefabToUI(baseName, group) {
             const item = document.createElement('div');
             item.className = 'prefab-item';
             const canvas = document.createElement('canvas');
             canvas.width = 200;
             canvas.height = 200;
             canvas.style.width = '100%';
             canvas.style.height = '100%';
             canvas.style.position = 'absolute';
             canvas.style.top = '0';
             canvas.style.left = '0';
             canvas.style.pointerEvents = 'none';
             const ctx = canvas.getContext('2d', { willReadFrequently: true });
             const label = document.createElement('span');
             label.innerText = baseName;
             label.title = baseName;
             item.appendChild(canvas);
             item.appendChild(label);
             document.getElementById('prefab-list').appendChild(item);
             
             const thumbModel = group.clone();
             thumbModel.updateMatrixWorld(true);
             const box = new THREE.Box3().setFromObject(thumbModel, true);
             const size = box.getSize(new THREE.Vector3());
             const center = box.getCenter(new THREE.Vector3());
             const maxDim = Math.max(size.x, size.y, size.z);
             thumbModel.position.sub(center);
             const rotationGroup = new THREE.Group();
             rotationGroup.rotation.x = -Math.PI / 2;
             rotationGroup.add(thumbModel);
             const container = new THREE.Group();
             container.add(rotationGroup);
             const scale = 8 / (maxDim || 0.1);
             container.scale.set(scale, scale, scale);
             
             thumbnailItems.push({ element: item, model: container, ctx, baseName, canvas });
             
             item.onclick = () => {
                 document.querySelectorAll('.prefab-item').forEach(b => b.classList.remove('active'));
                 item.classList.add('active');
                 window.isGhostLockedToOriginal = false;
                 window.selectPrefab(baseName);
                 if (isTouchDevice) {
                     isUIOpen = false;
                     document.getElementById('ui-container').style.transform = 'translateX(100%)';
                 }
             };
         }
         
         function addErrorToUI(fileName, errorMsg) {
             const listContainer = document.getElementById('prefab-list');
             const item = document.createElement('div');
             item.className = 'prefab-item-error';
             item.title = `File: ${fileName}\nError: ${errorMsg}`; 
             item.innerHTML = `
                 <span class="material-symbols-rounded icon">broken_image</span>
                 <div class="text-container">
                     <span class="err-title">${fileName}</span>
                     <span class="err-desc" style="color: #ffb4a2; font-weight: bold;">${errorMsg}</span>
                 </div>
             `;
             listContainer.insertBefore(item, listContainer.firstChild);
         }
         
         async function processMap(mapData, buildWorld = false, onProgress = null, lightmapData = null) {
             const propDict = await getPropDict(mapData); 
             
             const uniqueModelToLib = new Map(); 
             const uniqueTexToLib = new Map();
             const repeatingTextures = new Set(); 
             
             const getBaseUrl = (libName) => {
                 return (libName && window.currentLibraryBaseUrl) ? window.currentLibraryBaseUrl : window.currentMapBaseUrl;
             };
         
             for (const prop of mapData.props) {
                 let pInfo = propDict[`${window.currentLibraryUrl}_${prop.grpName}_${prop.name}`] || propDict[`${window.currentLibraryUrl}_${prop.name}`];
                 if (!pInfo) pInfo = propDict[`${prop.grpName}_${prop.name}`] || propDict[prop.name];
                 const baseUrl = getBaseUrl(prop.libName);
                 
                 if (!prop.libName) {
                     uniqueModelToLib.set(`${baseUrl}/models.a3d`, { file: 'models.a3d', baseUrl });
                 } else {
                     let file = (pInfo && pInfo.mesh && pInfo.mesh.file) ? pInfo.mesh.file : (prop.name + ".a3d");
                     uniqueModelToLib.set(`${baseUrl}/${file}`, { file, baseUrl });
                 }
                 if (pInfo && pInfo.textures) {
                     for (let t of pInfo.textures) {
                         if (t.diffuseMap) uniqueTexToLib.set(`${baseUrl}/${t.diffuseMap}`, { texName: t.diffuseMap, baseUrl });
                     }
                 }
             }
         
             for (const mat of Object.values(mapData.materials)) {
                 for (const param of mat.texParams) {
                     const baseUrl = getBaseUrl(param.libName);
                     uniqueTexToLib.set(`${baseUrl}/${param.texName}`, { texName: param.texName, baseUrl });
                     if (param.name.startsWith('_Splat')) repeatingTextures.add(`${baseUrl}/${param.texName}`);
                 }
             }
             if (mapData.atlases) {
                 const baseUrl = window.currentMapBaseUrl;
                 for (const atlasName of Object.keys(mapData.atlases)) {
                     uniqueTexToLib.set(`${baseUrl}/${atlasName}`, { texName: atlasName, baseUrl });
                 }
             }
             
             const modelPromises = Array.from(uniqueModelToLib.entries()).map(async ([cacheKey, info]) => {
                 if (!modelCache.has(cacheKey)) {
                     try {
                         if (info.file.toLowerCase().endsWith('.a3d')) {
                             let a3dBuf;
                             try { a3dBuf = await fetchFile(`${info.baseUrl}/${info.file}`); } 
                             catch (fetchErr) {
                                 const lowerFile = info.file.toLowerCase();
                                 if (info.file !== lowerFile) a3dBuf = await fetchFile(`${info.baseUrl}/${lowerFile}`);
                                 else throw fetchErr; 
                             }
                             const a3dData = parseA3D(a3dBuf);
                             modelCache.set(cacheKey, a3dData); 
                         }
                     } catch (e) { addErrorToUI(info.file, e.message); }
                 }
             });
         
             const texPromises = Array.from(uniqueTexToLib.entries()).map(async ([cacheKey, info]) => {
                 if (!textureCache.has(cacheKey)) {
                     const isControl = info.texName.includes('-control'); 
                     const isRepeat = repeatingTextures.has(cacheKey);
                     let tex = await loadTextureDirect(`${info.baseUrl}/${info.texName}.webp`, true, isControl, isRepeat);
                     if (!tex && info.baseUrl !== window.currentMapBaseUrl && window.currentMapBaseUrl) {
                         tex = await loadTextureDirect(`${window.currentMapBaseUrl}/${info.texName}.webp`, true, isControl, isRepeat);
                     }
                     if (tex) textureCache.set(cacheKey, tex);
                 }
             });
         
             const lightmapPromises =[];
             if (lightmapData && lightmapData.lightmaps) {
                 lightmapData.lightmaps.forEach((lmName) => {
                     const cacheKey = `${window.currentMapBaseUrl}/${lmName}`;
                     if (!textureCache.has(cacheKey)) {
                        const url = `${window.currentMapBaseUrl}/${lmName}.webp`;
                        const promise = loadTextureDirect(url, true, true, false).then(tex => {
                            if (tex) { tex.flipY = false; tex.channel = 1; textureCache.set(cacheKey, tex); }
                        });
                        lightmapPromises.push(promise);
                     }
                 });
             }
         
             const allPromises =[...modelPromises, ...texPromises, ...lightmapPromises];
             let completed = 0;
             if (allPromises.length === 0 && onProgress) {
                 onProgress(1);
             } else if (allPromises.length > 0) {
                 const wrappedPromises = allPromises.map(p => p.then(res => {
                     completed++;
                     if (onProgress) onProgress(completed / allPromises.length);
                     return res;
                 }));
                 await Promise.all(wrappedPromises);
             }
         
             const getTexFromCache = (texName, baseUrl) => {
                 if (!texName) return null;
                 let tex = textureCache.get(`${baseUrl}/${texName}`);
                 if (!tex) tex = textureCache.get(`${window.currentMapBaseUrl}/${texName}`);
                 if (!tex) {
                     for (let[k, v] of textureCache.entries()) {
                         if (k.endsWith('/' + texName) || k === `null/${texName}`) return v;
                     }
                 }
                 return tex;
             };
         
             if (buildWorld) {
                 if (ghost) {
                     editorGroup.remove(ghost);
                     ghost = null;
                     currentPrefabGroup = null;
                     document.querySelector('.grid-floating-panel').style.display = 'none';
                 }
                 const toRemove =[];
                 editorGroup.children.forEach(child => { 
                     if (!child.userData.isCollisionGroup) {
                         toRemove.push(child); 
                     }
                 });
                 toRemove.forEach(c => editorGroup.remove(c));
             }
             
             if (window.collisionGroup) {
                 editorGroup.remove(window.collisionGroup);
                 window.collisionGroup = null;
             }
             
             window.collisionGroup = new THREE.Group();
             window.collisionGroup.userData.isCollisionGroup = true;
             const toggleBtn = document.getElementById('toggle-collision-btn');
             window.collisionGroup.visible = toggleBtn && toggleBtn.classList.contains('active');
             
             const createCollisions = (colData, colorHex) => {
                 if (!colData) return;
                 const mat1 = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3, depthWrite: false });
                 const mat2 = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3, depthWrite: false });
                 const mat3 = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.3, depthWrite: false, side: THREE.DoubleSide });

                 if (colData.shapesType1) {
                     colData.shapesType1.forEach(d => {
                         const geo = new THREE.BoxGeometry(d[6], d[7], d[8]);
                         const mesh = new THREE.Mesh(geo, mat1);
                         mesh.position.set(d[0], d[1], d[2]);
                         mesh.rotation.set(d[3], d[4], d[5], 'ZYX');
                         window.collisionGroup.add(mesh);
                     });
                 }
                 if (colData.shapesType2) {
                     colData.shapesType2.forEach(d => {
                         const length = d.f1;
                         const width = d.f2;
                         const thickness = 5;
                         
                         const geo = new THREE.BoxGeometry(width, length, thickness);
                         
                         const mesh = new THREE.Mesh(geo, mat2);
                         mesh.position.set(d.data[0], d.data[1], d.data[2]);
                         mesh.rotation.set(d.data[3], d.data[4], d.data[5], 'ZYX');
                         window.collisionGroup.add(mesh);
                     });
                 }
                 if (colData.shapesType3) {
                     colData.shapesType3.forEach(d => {
                         const geo = new THREE.BufferGeometry();
                         const v = new Float32Array([
                             d.data[6], d.data[7], d.data[8],
                             d.data[9], d.data[10], d.data[11],
                             d.data[12], d.data[13], d.data[14]
                         ]);
                         geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
                         const mesh = new THREE.Mesh(geo, mat3);
                         mesh.position.set(d.data[0], d.data[1], d.data[2]);
                         mesh.rotation.set(d.data[3], d.data[4], d.data[5], 'ZYX');
                         window.collisionGroup.add(mesh);
                     });
                 }
             };

             createCollisions(mapData.collisionData1, 0xFF3333); 
             createCollisions(mapData.collisionData2, 0x33FF33); 
             
             editorGroup.add(window.collisionGroup);
             
             let originalMapGroup = null;
             let originalInstancesMap = new Map();
             
             if (buildWorld) {
                 originalMapGroup = new THREE.Group();
                 originalMapGroup.userData.isOriginalMapGroup = true;
                 editorGroup.add(originalMapGroup);
             }
         
             const materialCache = new Map();
         
             for (let i = 0; i < mapData.props.length; i++) {
                 const prop = mapData.props[i];
                 let baseName = getCleanBaseName(prop.name);
                 
                 let pInfo = propDict[`${window.currentLibraryUrl}_${prop.grpName}_${prop.name}`] || propDict[`${window.currentLibraryUrl}_${prop.name}`];
                 if (!pInfo) pInfo = propDict[`${prop.grpName}_${prop.name}`] || propDict[prop.name];
                 
                 const file = (pInfo && pInfo.mesh && pInfo.mesh.file) ? pInfo.mesh.file : (prop.name + ".a3d");
                 const baseUrl = getBaseUrl(prop.libName);

                 prop._pInfo = pInfo;
                 prop._baseUrl = baseUrl;
                 prop._file = file;
                 
                 let geometry = null;
                 let a3dData = null;
             
                 let modelCacheKey = prop.libName ? `${baseUrl}/${file}` : `${baseUrl}/models.a3d`;
                 a3dData = modelCache.get(modelCacheKey);
         
                 if (!a3dData) {
                     let fallbackFile = prop.libName ? file : 'models.a3d';
                     for (let [k, v] of modelCache.entries()) {
                         if (k.endsWith('/' + fallbackFile) || k === fallbackFile || k === `null/${fallbackFile}`) {
                             a3dData = v;
                             break;
                         }
                     }
                 }
             
                 if (a3dData) {
                     if (!prop.libName) {
                         if (a3dData.namedMeshes) {
                             geometry = a3dData.namedMeshes[prop.name];
                             if (!geometry) {
                                 const matchedKey = Object.keys(a3dData.namedMeshes).find(k => k.toLowerCase() === prop.name.toLowerCase());
                                 if (matchedKey) geometry = a3dData.namedMeshes[matchedKey];
                             }
                         }
                     } else {
                         if (a3dData.namedMeshes && Object.keys(a3dData.namedMeshes).length > 0) {
                             geometry = Object.values(a3dData.namedMeshes)[0];
                         } else if (a3dData.meshes && a3dData.meshes.length > 0) {
                             geometry = a3dData.meshes[0];
                         }
                     }
                 }
             
                 if (!geometry) continue;
                 
                 const matInfo = mapData.materials[prop.matID];
         
                 let controlTexName = null;
                 let baseTexName = null;
                 let splat0TexName = null, splat1TexName = null, splat2TexName = null, splat3TexName = null;
                 let matBaseUrl = window.currentMapBaseUrl; 

                 if (matInfo && matInfo.texParams) {
                     const pControl = matInfo.texParams.find(p => p.name === '_Control');
                     if (pControl) controlTexName = pControl.texName;

                     const pBase = matInfo.texParams.find(p => p.name === '_BaseMap' || p.name === '_MainTex');
                     if (pBase) {
                         baseTexName = pBase.texName;
                         if (pBase.libName && window.currentLibraryBaseUrl) matBaseUrl = window.currentLibraryBaseUrl;
                     }

                     const pSplat0 = matInfo.texParams.find(p => p.name === '_Splat0');
                     if (pSplat0) splat0TexName = pSplat0.texName;
                     const pSplat1 = matInfo.texParams.find(p => p.name === '_Splat1');
                     if (pSplat1) splat1TexName = pSplat1.texName;
                     const pSplat2 = matInfo.texParams.find(p => p.name === '_Splat2');
                     if (pSplat2) splat2TexName = pSplat2.texName;
                     const pSplat3 = matInfo.texParams.find(p => p.name === '_Splat3');
                     if (pSplat3) splat3TexName = pSplat3.texName;
                 }
         
                 if (!baseTexName && pInfo && pInfo.textures && pInfo.textures.length > 0) {
                     const fallbackTex = pInfo.textures.find(t => t.diffuseMap && !t.diffuseMap.includes('-control'));
                     if (fallbackTex) {
                         baseTexName = fallbackTex.diffuseMap;
                         matBaseUrl = baseUrl;
                     }
                 }
                 if (!controlTexName && pInfo && pInfo.textures && pInfo.textures.length > 0) {
                     const fallbackCtrl = pInfo.textures.find(t => t.diffuseMap && t.diffuseMap.includes('-control'));
                     if (fallbackCtrl) controlTexName = fallbackCtrl.diffuseMap;
                 }
                 
                 prop._baseTexName = baseTexName;
                 prop._controlTexName = controlTexName;
                 prop._splat0TexName = splat0TexName; 
                 prop._splat1TexName = splat1TexName; 
                 prop._splat2TexName = splat2TexName; 
                 prop._splat3TexName = splat3TexName; 
         
                 const instGeo = geometry.clone();
                 instGeo.name = geometry.name || prop.name; 
                 
                 let mat;
                 const isTerrainMesh = file.toLowerCase().includes('terrain');
                 const hasControlMap = !!controlTexName;
         
                 let targetTexName = baseTexName;
                 let atlasRect = null;
                 let atlasInfo = null;
         
                 let matName1 = null;
                 let matName2 = null;
                 if (a3dData && geometry && geometry.userData) {
                     let matIds = geometry.userData.matIds;
                     if (!matIds || matIds.length === 0) matIds = geometry.userData.v2MatIds;
                     if (matIds && matIds.length > 0) {
                         const mObj = a3dData.a3dMaterials ? a3dData.a3dMaterials[matIds[0]] : null;
                         if (mObj) {
                             matName1 = mObj.matName;
                             matName2 = mObj.texName;
                         }
                     }
                 }
         
                 const cleanStr = (s) => {
                     if (!s) return null;
                     let c = s.replace(/\\/g, '/').split('/').pop();
                     if (c.indexOf('.') !== -1) c = c.substring(0, c.lastIndexOf('.'));
                     return c;
                 };
                 matName1 = cleanStr(matName1);
                 matName2 = cleanStr(matName2);
         
                 const exactKeys =[baseTexName, prop.name, baseName].filter(Boolean).map(s => s.toLowerCase());
                 const fuzzyKeys =[matName1, matName2].filter(Boolean).map(s => s.toLowerCase());
         
                 if (mapData.atlases) {
                     let found = false;
                     for (const[aName, aInfo] of Object.entries(mapData.atlases)) {
                         for (const [rectKey, rect] of Object.entries(aInfo.rects)) {
                             const lowerKey = rect.originalName.toLowerCase();
                             if (exactKeys.some(pk => lowerKey === pk || lowerKey === `_${pk}` || lowerKey.endsWith(`_${pk}`))) {
                                 atlasRect = rect;
                                 atlasInfo = aInfo;
                                 targetTexName = aName; 
                                 found = true;
                                 break;
                             }
                         }
                         if (found) break;
                         for (const[rectKey, rect] of Object.entries(aInfo.rects)) {
                             const lowerKey = rect.originalName.toLowerCase();
                             if (fuzzyKeys.some(pk => lowerKey === pk || lowerKey === `_${pk}`)) {
                                 atlasRect = rect;
                                 atlasInfo = aInfo;
                                 targetTexName = aName; 
                                 found = true;
                                 break;
                             }
                         }
                         if (found) break;
                     }
                 }
                 
                 if (atlasRect) {
                     prop._atlasRect = atlasRect;
                     prop._atlasName = targetTexName;
                     prop._atlasBaseUrl = window.currentMapBaseUrl;
                 }
         
                 const matCacheKey = `${isTerrainMesh}_${controlTexName}_${targetTexName}_${prop.matID}_${prop.libName}_${prop.name}_${baseUrl}`;
                 if (materialCache.has(matCacheKey)) {
                     mat = materialCache.get(matCacheKey);
                 } else {
                     if (isTerrainMesh || hasControlMap) {
                         let texR = null, texG = null, texB = null, texA = null;
                         if (matInfo && matInfo.texParams) {
                             const splat0 = matInfo.texParams.find(p => p.name === '_Splat0');
                             const splat1 = matInfo.texParams.find(p => p.name === '_Splat1');
                             const splat2 = matInfo.texParams.find(p => p.name === '_Splat2');
                             const splat3 = matInfo.texParams.find(p => p.name === '_Splat3');
                             
                             if (splat0) texR = getTexFromCache(splat0.texName, matBaseUrl);
                             if (splat1) texG = getTexFromCache(splat1.texName, matBaseUrl);
                             if (splat2) texB = getTexFromCache(splat2.texName, matBaseUrl);
                             if (splat3) texA = getTexFromCache(splat3.texName, matBaseUrl);
                         }
                         let tControl = getTexFromCache(controlTexName, matBaseUrl);
                         const maxAniso = renderer.capabilities.getMaxAnisotropy();
                         if (texR && texR.anisotropy !== maxAniso) texR.anisotropy = maxAniso;
                         if (texG && texG.anisotropy !== maxAniso) texG.anisotropy = maxAniso;
                         if (texB && texB.anisotropy !== maxAniso) texB.anisotropy = maxAniso;
                         if (texA && texA.anisotropy !== maxAniso) texA.anisotropy = maxAniso;
                                           
                        const forceRepeat = (tex) => {
                            if (tex && (tex.wrapS !== THREE.RepeatWrapping || tex.wrapT !== THREE.RepeatWrapping)) {
                                tex.wrapS = THREE.RepeatWrapping;
                                tex.wrapT = THREE.RepeatWrapping;
                                tex.needsUpdate = true;
                            }
                        };
                        forceRepeat(texR);
                        forceRepeat(texG);
                        forceRepeat(texB);
                        forceRepeat(texA);
                       
         
                         mat = new THREE.MeshStandardMaterial({
                             roughness: 1.0,
                             metalness: 0.0,
                             side: THREE.DoubleSide
                         });
                         
                          
         
                         let customUniforms = {
                             tControl: { value: tControl || defaultControl },
                             tR: { value: texR || defaultTile }, 
                             tG: { value: texG || defaultTile }, 
                             tB: { value: texB || defaultTile },
                             tA: { value: texA || defaultTile },
                             uHasSplat3: { value: !!texA }
                         };
         
                         mat.onBeforeCompile = (shader) => {
                             shader.uniforms.tControl = customUniforms.tControl;
                             shader.uniforms.tR = customUniforms.tR;
                             shader.uniforms.tG = customUniforms.tG;
                             shader.uniforms.tB = customUniforms.tB;
                             shader.uniforms.tA = customUniforms.tA;
                             shader.uniforms.uHasSplat3 = customUniforms.uHasSplat3;
         
                             shader.vertexShader = `
                                 varying vec2 vUvControl;
                                 varying vec3 vLocalPos;
                                 ${shader.vertexShader}
                             `.replace(
                                 `#include <uv_vertex>`,
                                 `#include <uv_vertex>
                                  vUvControl = uv;
                                  vLocalPos = position;
                                 `
                             );
         
                             shader.fragmentShader = `
                                 uniform sampler2D tControl;
                                 uniform sampler2D tR;
                                 uniform sampler2D tG;
                                 uniform sampler2D tB;
                                 uniform sampler2D tA;
                                 uniform bool uHasSplat3;
                                 varying vec2 vUvControl;
                                 varying vec3 vLocalPos;
                                 ${shader.fragmentShader}
                             `.replace(
                                 `#include <map_fragment>`,
                                 `
                                 vec4 control = texture2D(tControl, vUvControl);
                                 float w1 = control.r;
                                 float w2 = control.g;
                                 float w3 = control.b;
                                 float w4 = uHasSplat3 ? control.a : 0.0;
                                 vec3 dx = dFdx(vLocalPos);
                                 vec3 dy = dFdy(vLocalPos);
                                 vec3 geoNormal = normalize(cross(dx, dy));
                                 vec3 blendWeights = abs(geoNormal);
                                 blendWeights = pow(blendWeights, vec3(8.0));
                                 blendWeights /= dot(blendWeights, vec3(1.0));
                                 float texScale = 1.0 / 500.0;
                                 vec2 uvX = vec2(vLocalPos.y, vLocalPos.z) * texScale;
                                 vec2 uvY = vec2(vLocalPos.x, vLocalPos.z) * texScale;
                                 vec2 uvZ = vec2(vLocalPos.x, vLocalPos.y) * texScale;
                                 vec4 colR = texture2D(tR, uvX) * blendWeights.x + texture2D(tR, uvY) * blendWeights.y + texture2D(tR, uvZ) * blendWeights.z;
                                 vec4 colG = texture2D(tG, uvX) * blendWeights.x + texture2D(tG, uvY) * blendWeights.y + texture2D(tG, uvZ) * blendWeights.z;
                                 vec4 colB = texture2D(tB, uvX) * blendWeights.x + texture2D(tB, uvY) * blendWeights.y + texture2D(tB, uvZ) * blendWeights.z;
                                 vec4 colA = vec4(0.0);
                                 if (uHasSplat3) {
                                     colA = texture2D(tA, uvX) * blendWeights.x + texture2D(tA, uvY) * blendWeights.y + texture2D(tA, uvZ) * blendWeights.z;
                                 }
                                 vec4 splatColor = colR * w1 + colG * w2 + colB * w3 + colA * w4;
                                 float sum = w1 + w2 + w3 + w4;
                                 if (sum > 0.001) { splatColor = splatColor / sum; } else { discard; }
                                 diffuseColor = vec4(splatColor.rgb, diffuseColor.a);
                                 `
                             );
                         };
                         mat.customProgramCacheKey = function() { return "terrain_" + matCacheKey; };
                     } else {
                         mat = new THREE.MeshStandardMaterial({ 
                             color: 0xffffff, roughness: 1.0, metalness: 0.0,
                             side: THREE.DoubleSide, transparent: false, alphaTest: 0.5, depthWrite: true
                         });
                         
                         if (targetTexName) {
                             const diffTex = getTexFromCache(targetTexName, matBaseUrl);
                             if (diffTex) mat.map = diffTex;
                             else { mat.color.setHex(0xaaaaaa); mat.map = defaultTile; }
                         } else {
                             mat.color.setHex(0xaaaaaa); mat.map = defaultTile;
                         }
                     }
                     materialCache.set(matCacheKey, mat);
                 }

         async function generateMapBin() {
             const propsToWrite =[];
             let idMapping = new Map();
             let globalIdCounter = 0; 
           
             let originalMapGrp = editorGroup.children.find(c => c.userData.isOriginalMapGroup);
             if (originalMapGrp) {
                 for (const child of originalMapGrp.children) {
                     if (child.userData.originalProps && child.userData.originalProps.length > 0) {
                         let meshIdx = 0;
                         for (const origProp of child.userData.originalProps) {
                             const mesh = child.children[meshIdx++];
                             const partMatrix = new THREE.Matrix4().multiplyMatrices(child.matrixWorld, mesh.matrix);
                             const rawMatrix = partMatrix.premultiply(editorGroup.matrixWorld.clone().invert());
                             const pos = new THREE.Vector3(); const quat = new THREE.Quaternion(); const scl = new THREE.Vector3();
                             rawMatrix.decompose(pos, quat, scl);
                             const euler = new THREE.Euler().setFromQuaternion(quat, 'ZYX');
                             propsToWrite.push({
                                 ...origProp,
                                 id: globalIdCounter,
                                 pos:[pos.x, pos.y, pos.z],
                                 rot:[euler.x, euler.y, euler.z],
                                 scale:[scl.x, scl.y, scl.z]
                             });
                             idMapping.set(origProp.id, globalIdCounter);
                             globalIdCounter++;
                         }
                     }
                 }
             }
         
             let instanceIndex = 1;
             for (const child of editorGroup.children) {
                 if (child === ghost || child.userData.isOriginalMapGroup || child.userData.isCollisionGroup) continue;  
                 if (child.userData.originalProps) {
                     let meshIdx = 0;
                     for (const origProp of child.userData.originalProps) {
                         const mesh = child.children[meshIdx++];
                         const partMatrix = new THREE.Matrix4().multiplyMatrices(child.matrixWorld, mesh.matrix);
                         const rawMatrix = partMatrix.premultiply(editorGroup.matrixWorld.clone().invert());
                         const pos = new THREE.Vector3(); const quat = new THREE.Quaternion(); const scl = new THREE.Vector3();
                         rawMatrix.decompose(pos, quat, scl);
                         const euler = new THREE.Euler().setFromQuaternion(quat, 'ZYX');
                         let outGrpName = origProp.grpName;
                         if (outGrpName && outGrpName !== "") outGrpName = outGrpName + "_inst" + instanceIndex;
                         propsToWrite.push({
                            ...origProp,
                            grpName: outGrpName,
                            id: globalIdCounter,
                            pos:[pos.x, pos.y, pos.z],
                            rot:[euler.x, euler.y, euler.z],
                            scale:[scl.x, scl.y, scl.z]
                         });
                         idMapping.set(origProp.id, globalIdCounter);
                         globalIdCounter++;
                     }
                     instanceIndex++;
                 }
             }
             
             window.dynamicAtlasesToSlice =[]; 
             let nextMatID = 0;
             const newMaterials =[];
             const rectNameToMatID = new Map();
             
             for (const p of propsToWrite) {
                 let libFolder = getDecimalPrefix(p._baseUrl);

                 if (p._controlTexName) {
                     const applyPrefix = (texName) => {
                         if (!texName) return null;
                         let baseName = texName.split('/').pop();
                         return baseName.startsWith(libFolder + "_") ? baseName : `${libFolder}_${baseName}`;
                     };

                     let pCtrl = applyPrefix(p._controlTexName);
                     let pS0 = applyPrefix(p._splat0TexName);
                     let pS1 = applyPrefix(p._splat1TexName);
                     let pS2 = applyPrefix(p._splat2TexName);
                     let pS3 = applyPrefix(p._splat3TexName);

                     let matKey = `TERRAIN_${pCtrl}_${pS0}_${pS1}_${pS2}_${pS3}`;
                     if (!rectNameToMatID.has(matKey)) {
                         rectNameToMatID.set(matKey, nextMatID);
                         let texParams = [{ name: "_Control", texName: pCtrl }];
                         if (pS0) texParams.push({ name: "_Splat0", texName: pS0 });
                         if (pS1) texParams.push({ name: "_Splat1", texName: pS1 });
                         if (pS2) texParams.push({ name: "_Splat2", texName: pS2 });
                         if (pS3) texParams.push({ name: "_Splat3", texName: pS3 });

                         newMaterials.push({ 
                             id: nextMatID, 
                             name: `Terrain_Auto_${nextMatID}`, 
                             shader: "TankiOnline/Terrain", 
                             texParams: texParams 
                         });
                         nextMatID++;
                     }
                     p.matID = rectNameToMatID.get(matKey);

                 } else if (p._atlasRect) {
                     let atlasFolder = getDecimalPrefix(p._atlasBaseUrl);
                     let uniqueTexName = `${atlasFolder}_${p._atlasRect.originalName}`;
                     let rectKey = `${p._atlasBaseUrl}_${p._atlasRect.originalName}`;
                     if (!rectNameToMatID.has(rectKey)) {
                         rectNameToMatID.set(rectKey, nextMatID);
                         newMaterials.push({ 
                             id: nextMatID, name: uniqueTexName, shader: "TankiOnline/SingleTextureShader", 
                             texParams:[{ name: "_MainTex", texName: uniqueTexName }] 
                         });
                         window.dynamicAtlasesToSlice.push({ 
                             atlas: p._atlasName, rect: p._atlasRect, baseUrl: p._atlasBaseUrl, exportName: uniqueTexName
                         });
                         nextMatID++;
                     }
                     p.matID = rectNameToMatID.get(rectKey); 
                     
                 } else if (p._baseTexName) {
    let baseName = p._baseTexName.split('/').pop();
    let uniqueTexName = baseName.startsWith(libFolder + "_") ? baseName : `${libFolder}_${baseName}`;
    
    let texKey = `${p._baseUrl}_${baseName}`;
    
    if (!rectNameToMatID.has(texKey)) { 
        rectNameToMatID.set(texKey, nextMatID);
        newMaterials.push({
            id: nextMatID, name: uniqueTexName, shader: "TankiOnline/SingleTextureShader",
            texParams: [{ name: "_MainTex", texName: uniqueTexName }]
        });
        nextMatID++;
    }
    
    p.matID = rectNameToMatID.get(texKey); 
}
             }

             const bitFlags =[];
             const pushBit = (b) => bitFlags.push(b);
             const bw = new BinaryWriter();

             pushBit(false);
             pushBit(false);

             bw.writeStringLength(0); bw.writeStringLength(0); bw.writeStringLength(0);
             bw.writeStringLength(0); bw.writeStringLength(0); bw.writeStringLength(0);

             bw.writeStringLength(newMaterials.length);
             for (const nMat of newMaterials) {
                 bw.writeUint32(nMat.id, false);
                 bw.writeString(nMat.name);
                 pushBit(false); 
                 bw.writeString(nMat.shader);

                 bw.writeStringLength(nMat.texParams.length);
                 for (let tp of nMat.texParams) {
                     pushBit(false); 
                     bw.writeString(tp.name);
                     bw.writeString(tp.texName);
                 }

                 pushBit(false);
                 pushBit(false);
                 pushBit(false);
             }

             pushBit(false);

             bw.writeStringLength(propsToWrite.length);
             for (const p of propsToWrite) {
                 if (p.grpName && p.grpName !== "") { pushBit(true); bw.writeString(p.grpName); } else { pushBit(false); }
                 bw.writeUint32(p.id, false);
                 bw.writeString("");
                 bw.writeUint32(p.matID, false); 
                 bw.writeString(p.name);
                 bw.writeFloat32(p.pos[0], false); bw.writeFloat32(p.pos[1], false); bw.writeFloat32(p.pos[2], false);
                 const isRotZero = (Math.abs(p.rot[0]) < 1e-5 && Math.abs(p.rot[1]) < 1e-5 && Math.abs(p.rot[2]) < 1e-5);
                 if (!isRotZero) { pushBit(true); bw.writeFloat32(p.rot[0], false); bw.writeFloat32(p.rot[1], false); bw.writeFloat32(p.rot[2], false); } else { pushBit(false); }
                 const isScaleOne = (Math.abs(p.scale[0]-1) < 1e-5 && Math.abs(p.scale[1]-1) < 1e-5 && Math.abs(p.scale[2]-1) < 1e-5);
                 if (!isScaleOne) { pushBit(true); bw.writeFloat32(p.scale[0], false); bw.writeFloat32(p.scale[1], false); bw.writeFloat32(p.scale[2], false); } else { pushBit(false); }
             }
             
             const header = packHeader(bitFlags);
             const bodyBytes = bw.toUint8Array();
             
             const uncompressed = new Uint8Array(header.headerPrefix.length + header.extBytes.length + bodyBytes.length);
             uncompressed.set(header.headerPrefix, 0);
             uncompressed.set(header.extBytes, header.headerPrefix.length);
             uncompressed.set(bodyBytes, header.headerPrefix.length + header.extBytes.length);
             
             const binZipped = await wrapPacketCompressed(uncompressed);
             return { binData: binZipped, propsToWrite, idMapping };
         }

        async function autoCropAtlas(atlasName, rect, baseUrl) {
            const baseName = atlasName.split('/').pop();
            let buf = window.rawFileCache.get(`${baseUrl}/${atlasName}.webp`) || window.rawFileCache.get(`${baseUrl}/${atlasName}`) || window.rawFileCache.get(`${baseUrl}/${baseName}.webp`) || window.rawFileCache.get(atlasName + ".webp") || window.rawFileCache.get(baseName + ".webp") || window.rawFileCache.get(atlasName);
            if (!buf) return null;
            return new Promise((resolve) => {
                const blob = new Blob([buf], { type: 'image/webp' });
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = rect.w; canvas.height = rect.h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
                    canvas.toBlob(b => { URL.revokeObjectURL(url); resolve(b); }, 'image/webp', 0.9);
                };
                img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
                img.src = url;
            });
        }

             exportBtn.addEventListener('click', async () => {
                 try {
                     showToast("Preparing ZIP export...", false);
                     
                     if (!window.SparkMD5) {
                         await new Promise((resolve, reject) => {
                             const script = document.createElement('script');
                             script.src = "https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js";
                             script.onload = resolve;
                             script.onerror = reject;
                             document.head.appendChild(script);
                         });
                     }

                     const zip = new JSZip();
                     const metaInfoList =[];

                     async function addFileToZip(name, data) {
                         let arrayBuffer;
                         let size = 0;
                         if (data instanceof Blob) {
                             arrayBuffer = await data.arrayBuffer();
                             size = data.size;
                         } else if (data.buffer) {
                             arrayBuffer = data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength);
                             size = data.byteLength;
                         } else if (data instanceof ArrayBuffer) {
                             arrayBuffer = data;
                             size = data.byteLength;
                         } else {
                             const encoder = new TextEncoder();
                             const uint8 = encoder.encode(String(data));
                             arrayBuffer = uint8.buffer;
                             size = uint8.byteLength;
                         }
                         const md5 = SparkMD5.ArrayBuffer.hash(arrayBuffer);
                         metaInfoList.push({ name, size, md5 });
                         zip.file(name, data);
                     }
                     
                     const { binData, propsToWrite } = await generateMapBin();
                     
                     await addFileToZip("map.bin", binData);
          
                     
                     const geometriesToExport =[];
                     const exportedGeoNames = new Set();
                     const usedTexNames = new Set();
                     
                     for (const p of propsToWrite) {
                         if (!exportedGeoNames.has(p.name)) {
                             let geo = null;
                             const targetName = p.name.toLowerCase();
                             let pInfo = p._pInfo;
                             const libBaseUrl = p._baseUrl;
                             const searchFile = p._file;
                             
                             if (pInfo && pInfo.mesh && pInfo.mesh.file) {
                                 let fileA3d = modelCache.get(`${libBaseUrl}/${searchFile}`);
                                 if (!fileA3d) {
                                     for (const [key, a3d] of modelCache.entries()) {
                                         if (key.endsWith('/' + searchFile) || key === searchFile || key === `null/${searchFile}`) {
                                             fileA3d = a3d; break;
                                         }
                                     }
                                 }
                                 if (fileA3d) {
                                     if (fileA3d.namedMeshes && Object.keys(fileA3d.namedMeshes).length > 0) geo = Object.values(fileA3d.namedMeshes)[0];
                                     else if (fileA3d.meshes && fileA3d.meshes.length > 0) geo = fileA3d.meshes[0];
                                 }
                             }
                             if (!geo) {
                                 for (const [key, a3d] of modelCache.entries()) {
                                     if (a3d.namedMeshes) {
                                         const matchedKey = Object.keys(a3d.namedMeshes).find(k => k.toLowerCase() === targetName);
                                         if (matchedKey) { geo = a3d.namedMeshes[matchedKey]; break; }
                                     }
                                     if (!geo && a3d.meshes && a3d.meshes.length > 0) {
                                         if (key.toLowerCase().includes(targetName)) { geo = a3d.meshes[0]; break; }
                                     }
                                 }
                             }
                             
                             if (geo) {
                                 const cloneGeo = geo.clone();
                                 cloneGeo.name = p.name;
                                 if (!cloneGeo.userData.matIds) cloneGeo.userData.matIds = geo.userData.matIds || [0];
                                 geometriesToExport.push(cloneGeo);
                                 exportedGeoNames.add(p.name);
                             } else { console.warn("Missing geometry for: " + p.name); }
                         }
                         
                         const pInfo2 = p._pInfo;
                         const libBaseUrl = p._baseUrl;
                         if (pInfo2 && pInfo2.textures) {
                             for (let t of pInfo2.textures) {
                                 if (t.diffuseMap) usedTexNames.add(JSON.stringify({ name: t.diffuseMap, baseUrl: libBaseUrl }));
                             }
                         }
                         if (p._baseTexName) usedTexNames.add(JSON.stringify({ name: p._baseTexName, baseUrl: libBaseUrl }));
                         if (p._controlTexName) usedTexNames.add(JSON.stringify({ name: p._controlTexName, baseUrl: libBaseUrl }));
                         
                         if (p._splat0TexName) usedTexNames.add(JSON.stringify({ name: p._splat0TexName, baseUrl: libBaseUrl }));
                         if (p._splat1TexName) usedTexNames.add(JSON.stringify({ name: p._splat1TexName, baseUrl: libBaseUrl }));
                         if (p._splat2TexName) usedTexNames.add(JSON.stringify({ name: p._splat2TexName, baseUrl: libBaseUrl }));
                         if (p._splat3TexName) usedTexNames.add(JSON.stringify({ name: p._splat3TexName, baseUrl: libBaseUrl }));
                     }
                     
                     if (geometriesToExport.length > 0) {
                         const a3dBytes = exportOptimizedA3D(geometriesToExport);
                         await addFileToZip("models.a3d", a3dBytes);
                     } else { throw new Error("No valid model geometry data found, models.a3d generation failed!"); }
            
                     for (const itemStr of usedTexNames) {
                         const itemObj = JSON.parse(itemStr);
                         const tName = itemObj.name;
                         const baseUrl = itemObj.baseUrl;
                         const lowerName = tName.toLowerCase();
                         if (lowerName.includes('lightmap') || lowerName.includes('comp_light') || lowerName.startsWith('atlas')) continue;
                         
                         const baseName = tName.split('/').pop();
                         let buf = window.rawFileCache.get(`${baseUrl}/${tName}.webp`) || window.rawFileCache.get(`${baseUrl}/${tName}`) || window.rawFileCache.get(`${baseUrl}/${baseName}.webp`) || window.rawFileCache.get(tName + ".webp") || window.rawFileCache.get(tName) || window.rawFileCache.get(baseName + ".webp") || window.rawFileCache.get(baseName);
                         
                         if (buf) {
                             let libFolder = getDecimalPrefix(baseUrl);
                             let uniqueExportName = baseName;
                             if (!baseName.startsWith(libFolder + "_")) {
                                 uniqueExportName = `${libFolder}_${baseName}`;
                             }
                             
                             await addFileToZip(uniqueExportName + ".webp", buf);
                         }
                     }
                     if (window.dynamicAtlasesToSlice) {
                         for (const item of window.dynamicAtlasesToSlice) {
                             const croppedBlob = await autoCropAtlas(item.atlas, item.rect, item.baseUrl);
                             if (croppedBlob) {
                                 await addFileToZip(item.exportName + ".webp", croppedBlob);
                             }
                         }
                     }
                
                     metaInfoList.sort((a, b) => {
                         if (a.name < b.name) return -1;
                         if (a.name > b.name) return 1;
                         return 0;
                     });
                     zip.file("meta.info", JSON.stringify(metaInfoList, null, 2));
                     
                     const content = await zip.generateAsync({ type: 'blob', compression: "DEFLATE", compressionOptions: { level: 6 }});
                     const url = URL.createObjectURL(content);
                     const a = document.createElement('a');
                     a.href = url;
                     const timestamp = Date.now();
                     a.download = `exported_map_${timestamp}.zip`;
                     document.body.appendChild(a);
                     a.click();
                     document.body.removeChild(a);
                     URL.revokeObjectURL(url);
                     
                     showToast("ZIP Export successful!", false);
                 } catch (err) {
                     console.error(err);
                     showToast("Export failed: " + err.message);
                 }

             document.getElementById('cm-move').onclick = () => {

                     let name = selectedObjectForAction.userData.baseName;
                     if (!name && selectedObjectForAction.userData.originalProps && selectedObjectForAction.userData.originalProps.length > 0) {
                         let pName = selectedObjectForAction.userData.originalProps[0].name;
                         name = getCleanBaseName(pName);
                     }
                     const rot = selectedObjectForAction.rotation.clone();
                    const pos = selectedObjectForAction.position.clone();
                    const scales = selectedObjectForAction.children.map(c => c.scale.clone());
                    window.originalObjectBeingMoved = selectedObjectForAction;
                     window.originalObjectParent = selectedObjectForAction.parent;
                     if (selectedObjectForAction.parent) selectedObjectForAction.parent.remove(selectedObjectForAction);
                     else editorGroup.remove(selectedObjectForAction);
                     if (name) {
                         window.dragMode = 'none'; updateDragModeUI(); window.isGhostLockedToOriginal = true; 
                         
                         if (!prefabs.has(name)) {
                             const fallbackPrefab = window.originalObjectBeingMoved.clone();
                             fallbackPrefab.position.set(0, 0, 0);
                             fallbackPrefab.rotation.set(0, 0, 0);
                             prefabs.set(name, fallbackPrefab);
                         }
                         
                         window.selectPrefab(name);
                         if (ghost) {
                            ghost.rotation.copy(rot); ghost.position.copy(pos);
                            ghost.children.forEach((c, i) => { if (scales[i]) c.scale.copy(scales[i]); });
                            ghost.updateMatrixWorld(true);
                             const box = new THREE.Box3().setFromObject(ghost, true);
                             const originalWorldY = editorGroup.localToWorld(pos.clone()).y;
                             let dip = 0;
                             if (box.min.y !== Infinity) dip = (originalWorldY - box.min.y) / editorGroup.scale.z;
                             editorGroup.remove(ghost);
                             const originWorld = editorGroup.localToWorld(pos.clone());
                             const downRay = new THREE.Raycaster(originWorld, new THREE.Vector3(0, -1, 0));
                             const intersects = downRay.intersectObjects(editorGroup.children, true);
                             let hitZ = 0;
                             if (intersects.length > 0) { hitZ = editorGroup.worldToLocal(intersects[0].point).z; } 
                             else {
                                 const zeroPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                                 const ptWorld = new THREE.Vector3();
                                 if (downRay.ray.intersectPlane(zeroPlane, ptWorld)) hitZ = editorGroup.worldToLocal(ptWorld).z;
                             }
                             editorGroup.add(ghost);
                             let calculatedGridZ = (pos.z - dip) - hitZ;
                             if (isSnapping) calculatedGridZ = Math.round(calculatedGridZ / 100) * 100;
                             else calculatedGridZ = Math.round(calculatedGridZ);
                             currentGridHeight = calculatedGridZ;
                             const gridHeightDisplay = document.getElementById('grid-height-display');
                             if (gridHeightDisplay) gridHeightDisplay.innerText = currentGridHeight;
                             ghost.userData.baseHitPoint = pos.clone();
                             ghost.userData.baseHitPoint.z = hitZ;
                             updateGhost(currentMousePos.x, currentMousePos.y, true);
                         }
                     }
                 }
                 document.getElementById('context-menu').style.display = 'none';
                 selectedObjectForAction = null;
             };
         
             document.getElementById('cm-copy').onclick = () => {
                 if (selectedObjectForAction) {
                     let name = selectedObjectForAction.userData.baseName;
                     if (!name && selectedObjectForAction.userData.originalProps && selectedObjectForAction.userData.originalProps.length > 0) {
                         let pName = selectedObjectForAction.userData.originalProps[0].name;
                         name = getCleanBaseName(pName);
                     }
                     const rot = selectedObjectForAction.rotation.clone();
                    const pos = selectedObjectForAction.position.clone();
                    const scales = selectedObjectForAction.children.map(c => c.scale.clone());
                    window.originalObjectBeingMoved = null; window.originalObjectParent = null;
                     if (name) {
                         window.dragMode = 'none'; updateDragModeUI(); window.isGhostLockedToOriginal = true; 
                         
                         if (!prefabs.has(name)) {
                             const fallbackPrefab = selectedObjectForAction.clone();
                             fallbackPrefab.position.set(0, 0, 0);
                             fallbackPrefab.rotation.set(0, 0, 0);
                             prefabs.set(name, fallbackPrefab);
                         }
                         
                         window.selectPrefab(name);
                         window.isContinuousCopyEnabled = true;
                         const copyBtn = document.getElementById('continuous-copy-btn');
                         if (copyBtn) copyBtn.className = 'm3-btn m3-btn-primary';
                         if (ghost) {
                            ghost.rotation.copy(rot); ghost.position.copy(pos);
                            ghost.children.forEach((c, i) => { if (scales[i]) c.scale.copy(scales[i]); });
                            ghost.updateMatrixWorld(true);
                             const box = new THREE.Box3().setFromObject(ghost, true);
                             const originalWorldY = editorGroup.localToWorld(pos.clone()).y;
                             let dip = 0;
                             if (box.min.y !== Infinity) dip = (originalWorldY - box.min.y) / editorGroup.scale.z;
                             editorGroup.remove(ghost);
                             const originWorld = editorGroup.localToWorld(pos.clone());
                             const downRay = new THREE.Raycaster(originWorld, new THREE.Vector3(0, -1, 0));
                             const intersects = downRay.intersectObjects(editorGroup.children, true);
                             let hitZ = 0;
                             if (intersects.length > 0) { hitZ = editorGroup.worldToLocal(intersects[0].point).z; } 
                             else {
                                 const zeroPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                                 const ptWorld = new THREE.Vector3();
                                 if (downRay.ray.intersectPlane(zeroPlane, ptWorld)) hitZ = editorGroup.worldToLocal(ptWorld).z;
                             }
                             editorGroup.add(ghost);
                             let calculatedGridZ = (pos.z - dip) - hitZ;
                             if (isSnapping) calculatedGridZ = Math.round(calculatedGridZ / 100) * 100;
                             else calculatedGridZ = Math.round(calculatedGridZ);
                             currentGridHeight = calculatedGridZ;
                             const gridHeightDisplay = document.getElementById('grid-height-display');
                             if (gridHeightDisplay) gridHeightDisplay.innerText = currentGridHeight;
                             ghost.userData.baseHitPoint = pos.clone();
                             ghost.userData.baseHitPoint.z = hitZ;
                             updateGhost(currentMousePos.x, currentMousePos.y, true);
                         }
                     }
                 }
                 document.getElementById('context-menu').style.display = 'none';
                 selectedObjectForAction = null;
             };
         
             renderer.domElement.addEventListener('pointerdown', (e) => {
                 if (!e.isPrimary) return;

                 if (e.button === 1) {
                     e.preventDefault();
                     window.isMiddlePanMode = !window.isMiddlePanMode;
                     const anchorEl = document.getElementById('pan-anchor');
                     if (window.isMiddlePanMode) {
                         window.middlePanOrigin = { x: e.clientX, y: e.clientY };
                         window.middlePanCurrent = { x: e.clientX, y: e.clientY };
                         anchorEl.style.left = e.clientX + 'px';
                         anchorEl.style.top = e.clientY + 'px';
                         anchorEl.style.display = 'block';
                     } else {
                         anchorEl.style.display = 'none';
                     }
                     if (controls) controls.mouseStatus = 0; 
                     return;
                 }
                 
                 if (window.isMiddlePanMode) {
                     window.isMiddlePanMode = false;
                     document.getElementById('pan-anchor').style.display = 'none';
                     if (controls) controls.mouseStatus = 0;
                 }

                 isDragging = false;
                 pointerDownPos = {x: e.clientX, y: e.clientY};
                 
                 if (e.button === 2) {
                     document.getElementById('context-menu').style.display = 'none';
                     if (ghost) {
                 
                         window.isGhostFrozen = !window.isGhostFrozen;
                         if (window.isGhostFrozen) {
                             showToast("Prop frozen in place", false);
                         } else {
                             showToast("Prop unfrozen", false);
                             updateGhost(e.clientX, e.clientY);
                         }
                     } else {
                         handleLongPress(e.clientX, e.clientY);
                     }
                     return;
                 }
         
                 if (e.target.closest('#context-menu') || document.getElementById('context-menu').style.display === 'flex') {
                     document.getElementById('context-menu').style.display = 'none';
                 }
                 
                 if (window.dragMode !== 'none' && ghost && (window.cameraPointersCount || 0) < 2) {
                     window.isEditingDrag = true; editDragStart = {x: e.clientX, y: e.clientY};
                     initialGhostRot.copy(ghost.rotation); initialGridZ = currentGridHeight; window.hasSlidGridZ = false; return; 
                 }
         
                 if (window.isGhostLockedToOriginal) window.isGhostLockedToOriginal = false;
            if (isTouchDevice) {
                longPressTimer = setTimeout(() => handleLongPress(e.clientX, e.clientY), 500);
            }
            updateGhost(e.clientX, e.clientY);
             });
         
             renderer.domElement.addEventListener('pointermove', (e) => {
                 if (e.isPrimary) {
                     if (window.isMiddlePanMode) {
                         window.middlePanCurrent = { x: e.clientX, y: e.clientY };
                         if (controls) controls.mouseStatus = 0;
                         return;
                     }

                     if (Math.abs(e.clientX - pointerDownPos.x) > 15 || Math.abs(e.clientY - pointerDownPos.y) > 15) {
                         isDragging = true;
                         if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                         if (window.isGhostLockedToOriginal && window.dragMode === 'none') window.isGhostLockedToOriginal = false;
                     }
                 }
                 
                 if (window.isEditingDrag && window.dragMode !== 'none' && ghost) {
                     const deltaX = e.clientX - editDragStart.x;
                     const deltaY = e.clientY - editDragStart.y;
         
                     if (window.dragMode === 'rotate') {
                         let rotZ = deltaX * 0.02; let rotX = deltaY * 0.02; const snap = Math.PI / 4;
                         const camRightWorld = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                         const camUpWorld = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
                         const groupInv = editorGroup.matrixWorld.clone().invert();
                         const camRightLocal = camRightWorld.clone().transformDirection(groupInv).normalize();
                         const camUpLocal = camUpWorld.clone().transformDirection(groupInv).normalize();
         
                         if (window.rotateButtonMode === 'free') {
                             const qInitial = new THREE.Quaternion().setFromEuler(initialGhostRot);
                             const qUp = new THREE.Quaternion().setFromAxisAngle(camUpLocal, rotZ); 
                             const qRight = new THREE.Quaternion().setFromAxisAngle(camRightLocal, rotX);
                             const finalQ = new THREE.Quaternion().copy(qUp).multiply(qRight).multiply(qInitial);
                             if (isSnapping) {
                                 const euler = new THREE.Euler().setFromQuaternion(finalQ, ghost.rotation.order);
                                 euler.x = Math.round(euler.x / snap) * snap; euler.y = Math.round(euler.y / snap) * snap; euler.z = Math.round(euler.z / snap) * snap;
                                 ghost.rotation.copy(euler);
                             } else { ghost.quaternion.copy(finalQ); }
                         } else {
                             if (isSnapping) rotZ = Math.round(rotZ / snap) * snap;
                             const isCameraInverted = camUpLocal.z < 0; 
                             let finalRotZ = rotZ;
                             if (isCameraInverted) finalRotZ = -rotZ;
                             ghost.rotation.set(initialGhostRot.x, initialGhostRot.y, initialGhostRot.z + finalRotZ);
                         }
                     } else if (window.dragMode === 'gridZ') {
                         let deltaZ = -deltaY * 2; let newZ = initialGridZ + deltaZ;
                         if (Math.abs(deltaY) > 5) window.hasSlidGridZ = true;
                         if (isSnapping && window.hasSlidGridZ) newZ = Math.round(newZ / 100) * 100;
                         else if (isSnapping && !window.hasSlidGridZ) newZ = initialGridZ; 
                         currentGridHeight = newZ;
                         document.getElementById('grid-height-display').innerText = Math.round(currentGridHeight);
                     }
                     updateGhost(editDragStart.x, editDragStart.y, true); return;
                 }
                 if ((window.cameraPointersCount || 0) >= 2) return; 
                 updateGhost(e.clientX, e.clientY);
             });
         
             renderer.domElement.addEventListener('pointerup', (e) => {
                 if (!e.isPrimary) return;

                 if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
                 if (window.isEditingDrag) {
                     window.isEditingDrag = false;
                     if (Math.abs(e.clientX - pointerDownPos.x) > 10 || Math.abs(e.clientY - pointerDownPos.y) > 10) return;
                 }
                 if (window.wasMultiTouch) return;
                 
                 if (!isDragging && ghost && (e.button === 0 || e.pointerType === 'touch')) {
                     updateGhost(e.clientX, e.clientY, window.dragMode !== 'none' || window.isGhostLockedToOriginal);
                     const instance = currentPrefabGroup.clone();
                    instance.position.copy(ghost.position); instance.rotation.copy(ghost.rotation);
                    instance.children.forEach((c, i) => { if (ghost.children[i]) c.scale.copy(ghost.children[i].scale); });
                    instance.updateMatrixWorld(true);
                     instance.userData.worldBox = new THREE.Box3().setFromObject(instance, true);
                     instance.userData.baseName = window.currentBaseName;
                     editorGroup.add(instance);
                     window.originalObjectBeingMoved = null; window.originalObjectParent = null;
         
                     if (!window.isContinuousCopyEnabled) {
                         editorGroup.remove(ghost); ghost = null; window.isGhostLockedToOriginal = false; window.isGhostFrozen = false; document.querySelector('.grid-floating-panel').style.display = 'none';
                     } else {
                         window.isGhostLockedToOriginal = false; window.isGhostFrozen = false; window.dragMode = 'none';
                         if (window.updateDragModeUI) window.updateDragModeUI();
                         updateGhost(e.clientX, e.clientY, false);
                     }
                 }
             });
         }
         
         function updateGhost(clientX, clientY, isLockedDrag = false) {
             currentMousePos.x = clientX; currentMousePos.y = clientY;
             if (!ghost) return;
         
             if (!isLockedDrag && !window.isGhostLockedToOriginal && !window.isGhostFrozen) {
                 mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                 raycaster.setFromCamera(mouse, camera);
                 const intersects = raycaster.intersectObjects(editorGroup.children, true);
                 let hitPoint = null; let objHitPoint = null;
                 const validIntersects = intersects.filter(ix => {
                     let obj = ix.object;
                     while(obj) { if (obj === ghost || obj.userData.isCollisionGroup) return false; obj = obj.parent; }
                     return true;
                 });
                 if (validIntersects.length > 0) objHitPoint = validIntersects[0].point;
         
                 groundPlane.set(new THREE.Vector3(0, 1, 0), 0);
                 let zeroPlaneHitPoint = null; const zeroIntersect = new THREE.Vector3();
                 if (raycaster.ray.intersectPlane(groundPlane, zeroIntersect)) zeroPlaneHitPoint = zeroIntersect;
         
                 if (camera.position.y >= 0) {
                     if (objHitPoint && zeroPlaneHitPoint) {
                         if (camera.position.distanceTo(objHitPoint) < camera.position.distanceTo(zeroPlaneHitPoint)) hitPoint = objHitPoint;
                         else hitPoint = zeroPlaneHitPoint;
                     } else if (objHitPoint) hitPoint = objHitPoint;
                     else if (zeroPlaneHitPoint) hitPoint = zeroPlaneHitPoint;
                 } else {
                     if (objHitPoint) hitPoint = objHitPoint;
                     else if (zeroPlaneHitPoint) hitPoint = zeroPlaneHitPoint;
                 }
                 if (!hitPoint) {
                     hitPoint = raycaster.ray.at(1000, new THREE.Vector3());
                     if (camera.position.y >= 0) hitPoint.y = 0;
                 }
                 if (hitPoint) {
                     editorGroup.worldToLocal(hitPoint);
                     if (isSnapping && currentPrefabGroup) {
                         let snapped = false; let snapX = 250; let snapY = 250; let snapZ = 100;
                         for (let i = 0; i < editorGroup.children.length; i++) {
                             const child = editorGroup.children[i];
                             if (child === ghost || child.userData.isOriginalMapGroup || child.userData.isCollisionGroup) continue;
                             const dist = child.position.distanceTo(hitPoint);
                             if (dist < 800.0) {
                                 const diff = hitPoint.clone().sub(child.position);
                                 hitPoint.x = child.position.x + Math.round(diff.x / snapX) * snapX;
                                 hitPoint.y = child.position.y + Math.round(diff.y / snapY) * snapY;
                                 hitPoint.z = child.position.z + Math.round(diff.z / snapZ) * snapZ;
                                 snapped = true; break;
                             }
                         }
                         if (!snapped) {
                             hitPoint.x = Math.round(hitPoint.x / snapX) * snapX; hitPoint.y = Math.round(hitPoint.y / snapY) * snapY; hitPoint.z = Math.round(hitPoint.z / snapZ) * snapZ;
                         }
                     }
                     ghost.userData.baseHitPoint = hitPoint.clone();
                 }
             }
         
             if (ghost.userData.baseHitPoint) {
                 const hp = ghost.userData.baseHitPoint.clone();
                 hp.z += currentGridHeight;
                 ghost.position.copy(hp);
                 ghost.updateMatrixWorld(true);
                 const box = new THREE.Box3().setFromObject(ghost, true);
                 const originalWorldY = editorGroup.localToWorld(hp.clone()).y;
                 if (box.min.y !== Infinity) {
                     const dip = originalWorldY - box.min.y;
                     if (Math.abs(dip) > 0.001) ghost.position.z += dip / editorGroup.scale.z;
                 }
             }
         }
         
         loadMain();
