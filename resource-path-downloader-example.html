];

const el = document.getElementById("p");
let dlBytes = 0;
let totBytes = 0;

function update() {
    const d = (dlBytes / 1048576).toFixed(2);
    const t = (totBytes / 1048576).toFixed(2);
    const pct = totBytes > 0 ? ((dlBytes / totBytes) * 100).toFixed(1) : "0.0";
    el.innerText = `${d} MB / ${t} MB (${pct}%)`;
}

function parsePath(str) {
    try {
        const p = str.split('/').filter(x => x);
        if (p.length !== 5) return { folder: str, date: new Date() };
        
        const v = p.map(x => BigInt("0o" + x));
        const id = (v[0] << 32n) | (v[1] << 16n) | (v[2] << 8n) | v[3];
        
        const tsNumber = Number(v[4]);

        return {
            folder: `${id}_${tsNumber}`,
            date: new Date(tsNumber) 
        };
    } catch {
        return { folder: str, date: new Date() };
    }
}

async function run() {
    const zipWriter = new zip.ZipWriter(new zip.BlobWriter("application/zip"));
    const q = [];

    const metaPromises = dirs.map(async (d) => {
        try {
            const res = await fetch(host + d + "meta.info");
            if (!res.ok) return;
            
            const parsed = parsePath(d);
            const folderName = parsed.folder;
            const itemDate = parsed.date;

            await zipWriter.add(folderName + "/", null, { directory: true, lastModDate: itemDate });

            const list = await res.json();
            
            for (let f of list) {
                const n = f.name.toLowerCase();
                if (n.endsWith(".ktx") || n.endsWith(".meta") || n.endsWith(".info")) continue;
                
                totBytes += f.size;
                q.push({
                    url: host + d + f.name,
                    path: folderName + "/" + f.name,
                    date: itemDate
                });
            }
        } catch (e) {}
    });

    await Promise.all(metaPromises);
    update();

    const dlPromises = q.map(async (item) => {
        try {
            const res = await fetch(item.url);
            if (!res.ok) return;

            const reader = res.body.getReader();
            const chunks = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                dlBytes += value.length;
                update();
            }

            const blobObj = new Blob(chunks);
            await zipWriter.add(item.path, new zip.BlobReader(blobObj), { lastModDate: item.date });
        } catch (e) {}
    });

    await Promise.all(dlPromises);

    el.innerText = `Finalizing ZIP...`;
    const blob = await zipWriter.close();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "assets.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    
    el.innerText = "Done";
}

window.onload = run;
</script>
